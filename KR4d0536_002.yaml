body:
  text: 午溪集卷二元陳鎰撰五言古詩聚星堂與諸文士宴集分韻得凉字良㑹不易得清秋宴髙堂佳哉數君子𤣥髮俱已蒼心親無遐邇謂我如同鄉共結文字緣憂樂無相忘世道一如此風塵日飛揚放懷聊自遣終焉多感傷冥冥鴻鴈來幽幽蘭桂芳物情固有適吾徒幸小康相勸盡尊酒庶用慰凄凉九日次韻周學録重陽今朝是觸目皆兵戈青山豈不好何由陟嵯峨菊花泫清露楓葉飄寒波覩物增盛懷奈此時未和流年易超忽百世如鳥過於焉屏煩慮酌酒還髙歌因觀作吏人動輒遭譏訶奔馳風塵際憂患日已多吾徒守儒素其樂當如何再遊雅山分韻得秋字人生宇宙內起滅同浮漚云胡事形役局局懷抱憂今我及數子蕭散真寡儔已無外物縶偶往成勝游佳哉雅山境翠竹森琳球復此展清宴興逸聊賡酬林深鳥雀聚原曠禾黍稠時序良易邁不樂將焉求回途更延覽天風蕩衣裘薄暮微雨過輕寒釀深秋游延慶寺久厭城市喧偶出覽佳勝迢迢轉溪灣翳翳入山徑林深寒日薄塔聳秋雲净翠光冷松杉古韻度鐘磬躋石遂幽討掬泉足清興忽聞禪老偈頗發騷人詠塵空性自澄妄去心始定因悲射利徒擾擾一何競次韻冷冷軒彼美玉山泉涓涓出深谷滙作井洞幽其下龍蟠伏餘流散無聲清寒入山木曲折數里遙故繞詩人屋簷間寒月映簷外秋雲宿分貯歸瓶􅑥不用接修竹清聲惟在耳久聽天機熟寄語冷冷軒吾當挂冠服奉和經略使李公景儀古詩一首并呈參政石末公栝蒼實小郡居民守寒慳食鮮乃釣水茹美聊採山邇來遭喪亂奔走不暫間蕭條桑柘村門巷生榛管仰瞻使星臨宛若天開顔仁風播清穆英氣摧雄姦勤勞奉王事轍迹周塵寰恩波總沾沛下逮􅑱與鰥大參石末公理亂厯險艱精誠懸赤日烈烈照兩間斯文賴宗主慰我衰老瘝願言布陽春共挽生意還呈孫都事朔寒苦積隂烈風無時休况茲在萬山居然抱窮愁矯首瞻王眀偏照東南州陽春一以布皇華載咨諏感彼草木秀使我瘡痍瘳願安黎庶心六轡少淹留薄采泮池芹終朝不盈手邇來卧空谷蓬室甘老朽餘生偶然全當此喪亂後幸逢治化新民弊賴繩糾我公負經濟乃出羣賢首彚征徴自茲海內歸渾厚送易安道往金陵易侯來栝蒼朔雪尚留凍春陽一以敷生物欣稍衆辟書復寵招急起走鞭鞚江山麗金陵闊視天宇空我慙遁林陬道逺阻迎送寄情聊賦詩語拙不可誦期君在丹霄佇聽清風頌文運時方興及茲為大用次韻葉文範訓導雜詠八首留此巖避暑何年留此岩洞壑深藏幽懸崖石棧細佛屋居上頭聞君日登覽頗遂平生遊想當入空翠決􅐯香氣浮林深逺溽暑池淨涵清秋逢僧作茗供庶可終日留人生濁世中萬物同一漚今我衰且蹇亦復事林丘臨風誦君詩勢利兩俱休西澗暑夕懷友青山一何髙流水一何長念君守澗阿何因共相羊及茲暑雨霽遙夜生微凉居然抱幽獨四顧皆崇岡而我當此夕忽復病起牀徐行大溪上月在天中央衆星自隱見耿耿亦有光豈不增感懷沈吟寄來章山中晚步詩人在山中時夏忘熱惱壯心久已降想若風旌倒待月升山椒延風來木杪齊居近村墅桑竹自環繞更覺農事饒連畦秀禾稻川坂窈而深頗勝桃源好緩策經壑丘恬目送雲鳥安得逺相從逍遙共論道雖云途路難無使音書杳人生諒有分且復散冲抱再遊留此巖韻士得幽趣名山還再尋逍遙清凉界披豁煩熱襟粲粲古桂花娟娟青竹林慧日散佳彩慈雲結輕隂超然外形迹靜焉觀我心境空無礙物地勝多布金業緣尚覺淺味道殊喜深薄暮想忘歸坐聆清磬音賀西澗主人祈雨有應夏旱雨有數聚巫還可求今年忽大旱疲民實煎憂澗西隱君子精誠達冥幽沛然得甘霔白水滿田疇持杯㑹鄰里共賀百榖秋館賔栝中彥亦覺喜氣浮詩成逺相寄念我儒家流我昔為冷官一飯不易謀只今願年豐買田歸偃休遊東巖髙岩暑雨霽晨光眩初陽客子適登覽捫蘿陟層岡絶壁倚孤峭老樹鬱青蒼巍然頂僧廬金像眀滿堂鮮颷度危閣寶幢動鳴璫仰視天宇寬勝境何清涼傍有梁氏祠其人久已亡曽經禦强寇率兵此潛藏事往名則留興懷多慨慷至今人避亂固守全一方我家岩之陬依棲幸安康約子當再游飛佩髙頡頑西澗吟有客在澗西掬泉弄秋月委心任自然稍稍忘藴結空山更何有白雲靜堪悅時還摻孤琴清音隨意發却復念故廬州城暮天闊落葉飛不停嵗月去飄忽世道猶﨑嶇歸計那可决浩歌一長歎凉颷激踈樾午溪新堰開堰午溪上百畝可灌之長輸不盡流蓋有源頭為興言百世計生理始於茲雖然藉地利亦用人力施禾菽既沾澤稍稍慰農私園田久荒者一旦皆見治經營非我能廢興乃其時感君相問勞為作新堰詩題憲使單公寧山詩卷茲山幾千仭岩谷藏﨑嶔屹然大自在岡巒鬱層林長風息怒號微雲散輕隂勢摩蒼穹髙氣壓后土深皇皇繡衣使日夕頻登臨千里寄一瞬浩蕩開雄襟愛此成雅號處靜悅我心岩岩衆所瞻令名垂古今次韻春日友人過訪門前不盡溪種栁髙十尋時雨忽然過蕩漾春水深好鳥鳴間關動我懷友心正謀尊酒盈感子亦逺臨持杯起相酬清談豁冲襟世故尚艱難思古復慨今子乃久羇旅孤情寄髙吟戀戀未成别華月生東林次韻葉訓導同飲且懷道元上人人生出處異所厯多悲歡惓翮戀故林縱鱗思狂瀾焉知我輩人守靜心自寬相逢秋正中皓月如銀盤有此尊酒盈可浣憂恨端君言方外友一往骨已寒御觴忽不樂清賞情易闌余亦重懷感臨風寄長嘆次韻吳仲懷學録理髮有感君子遁林壑德潤日以滋清晨唘重門理髮延輕颸比櫛去其垢心愜乃自知盈顛忽種種覩茲却興悲感懷寄吟詠秀句何瓌竒默傷時序邁蹭蹬無所施風塵况擾擾涉歷世故危雖云髮早白年實未及衰惟昔踐場屋曽折丹桂枝功名姑少試其志在逺期而我苦節士亦復懷明時為子歌欲放歌罷還自嗤郡中次友人韻茂宰逺見招偶此到公府留連日復日及茲已徂暑子乃自逺回衣濕冒風雨如何父母邦栖栖若行旅賴有同心朋尊酒忘賔主謂言喪亂餘一飯皆天與我亦念前冬登山聽鼙鼓然火中夜行子實同此苦虎口幸脫生佚老還可許且當浩浩歌無為踏甕舞呈麗水吳眀府眀廷重守令茂宰出選掄公家世簮紱接踵皆良循麗邑雖曠僻風俗稍朴淳自公下車來息彼凋瘵民秉公守亷節敷政從寬仁眷此垂老年獲覩化瑟新熙熙百里內物象俱含春行看政治理飛舄登要津九日次韻葉訓導二年喪亂餘隱居聊種菊佳節倐已臨稍覺天氣肅杜門淡無營不與世馳逐凉風􅏒髙原殘陽挂疏木於焉寄登覽悠然豁心目為樂當及時嵗月去還速吾里窈而深子亦來卜築幸此隔清溪扁舟時往復所欣道義交固無榮與辱相逢輒命觴開軒逺山緑避亂西澗和蔡伯玉餞别韻携家逃亂世登君川上樓自非宿昔心曷肯為我謀開軒納逺山展席臨清流時游古仙岩頗憶阮與劉世路尚風塵此地殊深幽居然欣有托不覺成遲留眷眷終不怠此意誰能酬片言寫莫既感戴如山丘茲焉動歸興孟夏麥已秋握手未忍别碧雲生晚愁次韻梁天與憶子逺相過開酌梅花前微風自溪來素月當空懸結歡良未久執别感衰年况乃遭世亂辟地常懷賢寂寞居澗西孤坐寒無氊起看石崕瀑飛沫跳珠圓子亦在他方碧雲隔長天眷彼歲年晚哀鴻聲續連何當復相從剪燭夜不眠於時發清琴幽懷諒可宣次韻葉訓導兼簡徐定甫束書出城闉來住溪上宅五年喪亂中奔走身如客今春復逺游相望逺東北冷况雖蕭條文㑹多舊識我亦曽相從湖海念疇昔仄聞風月佳無由分半席書樓敞髙明逺對羣峯碧主人頗閒暇登陟時整屐君今喜賦歸溪深鮮可食世道尚艱危幸此居山澤臨風接清談逍遙寄茲夕次韻吳學録過訪二首故人過我宿青燈夜何其殷勤接軟語尊爼聊設施山寒耿孤月溪淨生微颸索居負幽意局蹐諒何為况於干戈際沉鬱多幽思子獨心神舒六學一貫之相從歲年晚慨彼時事非我衰如倦翮幽栖忘逺翔平生性耿介固於圓鑿方白雲自怡恱欲寄難持將子尚苦讀書一覽應五行蒼山可杖策午溪可舟航曷不時相從攄懷寄詞章别後情如何煙水愁莾蒼次韻答蔡伯玉春風蕩林梢晴光散虛亭好鳥鳴間關慰我幽居情景物日以佳豈不懷友朋顧茲咫尺間如何寡逢迎怡情一尊酒安得君同傾况乃衰病餘坦然息心兵種彼溪上竹碧隂滿忩櫺老去尚勤讀夜坐宜短檠承君寄佳章一覽塵思清何當來滄洲共結沙鷗盟次韻答友人我懷幽逸人佳境心所宅超然外形骸聽視寡聲色宴坐哦清詩秀句出林碧凉飈來廣􅒉微月耿虛夕茲時尊酒盈妙趣良有得而我蕭散姿亦抱山水癖不為世故牽寓物隨所適逍遙味道腴虗室自生白午溪集卷二
