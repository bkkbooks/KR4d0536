body:
  text: 午溪集卷六元陳鎰撰七言律詩石門紀遊山藏仙窟好溪湄滿徑秋雲冷濕衣萬古石門青不合半天瀑布雪長飛猿攀松子巖前落鶴趂琴童洞口歸謝李何年留傑句至今山水有清暉紫虛觀紫虛宮近少微垣俯瞰粼粼碧一川劫火不燒鍾呂像古碑尚記李唐年龍飛劍影來深洞鳯載簫聲下九天千載葛洪丹井在神光猶自發靈泉觀遭兵火鍾呂二像如故江心寺四顧瀰漫雪浪翻巍巍臺殿壓雲根天連塔影浮江浦風送鐘聲落海門老衲倚䦨延月色潛蛟蟠穴候潮痕古今登覽無窮思雲氣蒼蒼島樹昏甘露寺廢址金碧樓臺安在哉空留鐡塔鎮崔嵬慈雲散盡無甘露烈火燒殘有劫灰巨鑊欹斜堆敗葉斷碑零落付蒼苔老僧飛錫知何處落日長江潮自回遊蒼山道院松桂蒼蒼匝道邊林光搖蕩拂晴川桃花流水人間世石室丹霞洞府天一榻清風生竹潤半簷疏雨入茶烟詩人往往餘吟咏間剔蒼苔看石鐫次韻月明德經厯游茅山三峯翠色倚髙冥萬壑松聲撼百霆列宿拱垣低月殿彩雲扶轂近芝亭紫壇露冷晨幢濕金闕風微午篆馨遙想羣仙飛珮處碧霞縹眇玉瓏玲又次韻宿元符宮天風送客到茅山山疊千重路百盤松下石碑留玉篆竹邊藥竈飬金丹聲沈萬籟乾坤靜氣肅九霄風露寒乞取鼎餘換凡骨好隨仙侶躡飛鸞丹陽早發浮生擾擾幾時休又向長河理去舟雁帶吳雲鄉信逺蛩鳴楚月客心愁依依老桞風烟晚獵獵黃蘆水國秋借問今宵何處宿遙山青外是瓜洲遊西峯寺山繞招提面面青黃金臺殿敞春晴樹分兩徑參差起水積方池淡沱清並命鳥飛爭供食長生魚出聽鐘聲湛然亭上憑䦨久間看溪雲傍塔生三岩塵土寰中有底忙禪扉咫尺自清凉雲深古洞苔生井露冷疏林月滿廊紫玉叢開金色相水晶簷動白毫光慿誰捲取天潢雪好把楊枝灑下方次韻鄧知州㑹秦郵乾明寺二首特向詩禪覔一參秦郵寺裏聽雄談政成洛北官方滿家近淮南路熟諳春日竹忩多雅趣暮年蔗境有餘甘超然跳出塵籠外風月招邀興倍堪解組歸來隱樂郊手開藥圃旋除茅巢雲野鶴新添子亞水苔梅曲引梢翰苑曽傳坡老句禪門今結遁公交日來清思知何在茶臼時時隔竹敲再次韻呈天岸長老妙法無邊竟莫參洗心只欲聽清談空門枯淡師能守行路艱難我慣諳藝几半忩烟穗碧茶甌一掬井花甘淵明他日重來此蓮社投盟諒自堪瀟灑禪房近碧郊短墻重叠蓋黃茅光翻池上千桃樹秀入階前萬桞梢水滿草生魚意樂風微日暖鳥聲交更無餘事跏趺外從遣棊聲晝屢敲三用韻呈天石長老不二門中試往參了無文字况言談安心有法何從覓應事隨機已熟諳午榻偶聽風竹響春厨時薦野蔬甘勞生自愧多煩惱寧止嵇康七不堪路入琅山十里郊曽聞卓錫蓋新茅靈巖中竪擎天石祗樹東回偃月梢欲比淵明來入社也應支遁肯聨交他時襆被來尋約長聽鐘聲夜半敲旅懷滿樓風露薄幽襟素練縈忩月影臨市散燈收人語靜夢回酒醒夜寒深淮山殘雪三年客栝嶺飛雲萬里心珍重緑猗亭上竹平安長遣寄清吟次韻答友人青雲萬里豁雄襟淮海東邊得共臨吳楚地分平野濶金焦山湧大江深秋風楊桞離亭恨夜月梅花故國心試上層樓一悵望手絃緑綺和髙吟贈李晋卿葬師歸龍泉瀟瀟霜霰㸃行裝驢瘦童寒路更長十載江湖雙白鬢半生山水一青囊摩挲古劍心猶壯邂逅清尊興自狂歲晚不堪成話别石橋流水野梅香春日次韻羅善先照磨二首客裏光隂一瞬過壯年心事易蹉跎人生用舍同芻狗世態炎凉似腳婆緑靄釀春歸楚樹玉塵吹雨漲淮波相逢此地重擕手無奈千絲栁色多緑隂亭館曉光新久客秦淮兩度春霏屑雄談頻落塵軋霄老句更驚人游山未可間安石耕谷寧容老子真斛水蛟龍能變化春雷一鼓到天津再次韻答王子愚草木城深一雨過流年如此惜蹉跎雲間后土來天女風外清淮舞浪婆旅邸晝銷茶煮雪歌樓春透酒生波慿髙目斷江南路無限逺山歸興多簷影參差樹色新曉鶯啼破畫橋春桞分稚緑初眀眼花釀濃香欲醉人白日遊絲吟趣逺間雲流水道情真管絃不入騷人耳緩䇿尋芳傍野津和程渠翁見惠詩韻卯峯深處客忘還硯石從容意自間乘興無舟來剡曲懷人有夢到松間謀生每愧兔三窟學道長憐豹一斑若問日來新况味飯牛聊復卧南山次韻陳和仲江湖十載感流萍一日居山夢始清林下散樗難大用道旁苦李得全生拂苔蒼石和雲坐種秫平疇帶月耕慚愧故人疏濶甚南箕北斗信虛名挽西巖崇上人絶俗離群付陸沈屋雲分住古崕隂案頭經卷香猶在忩下蒲團塵欲侵翠擁山屏餘色相清涵海滴印禪心客來何處尋行跡黃葉漫山秋露深寺中有屏山軒海滴泉次韻客中送友人歸栝蒼二首落花飛絮滿江城薄靄遙遮逺色明别酒亂澆胸壘塊狂詩儘放筆縱橫石橋立馬日還暮野岸移舟潮已生自覺老懷偏作惡客中送客倍關情東風吹雨似輕塵握手河梁未忍分芳草緑波無限思落花啼鴂不多春離尊今夕蕪城月去棹眀朝瓜浦雲寄語故山猿鶴道秋來我亦整歸輪次韻枯梅苔封蘚蝕百年身雪虐霜叨數㸃春留得此花參太極看來生意是深仁羅浮仙子氷魂返飯顆詩人瘦態真不許世間兒女比臨風孤艷絶芳塵次韻植竹森森蒼玉謝斤鋤幽玩惟便山澤癯曉潤烟光連别墅夜凉月色滿前湖解苞便有風霜節寫影真成水墨圖對此翛然忘俗慮一杯拾葉煮雲腴和周濟翁寫别韻西風兩鬢已蒼然萬事無心只任天細飲黃花新酒味長吟緑竹舊詩篇登髙未落龍山帽盡興先回剡曲船後夜定知忩外月照人凉冷不成眠次韻村景芋葉瓜藤緑滿田數家烟火接平原溪分秋水繞孤嶼山障夕陽明半村訪鶴客來松下徑掃花童立竹邊門居安便是神仙境何必桃源避世喧八月十四夜宿松溪山莊次韻湖海經年滯客程相逢一嘯叙前盟路經山雨青泥滑風捲溪雲白月明幸有芳尊酬此夕惜無佳句續髙情酒醒不惜匆匆别共聽鐘聲出曉城和劉益洲訓導見惠詩韻五年奔走客中忙長想詩筒翰墨香老我日添頭髮白故園秋負菊花黃勞生自笑烏三繞飬拙還同龜六藏何日相過溪竹外欵陪尊酒到斜陽哭外舅此山先生才名奕奕冠當今投老林泉樂意深太華黃河曽識面玉堂金馬有知心夀杯未及希年賀詩卷空添近日吟慨想音容尚如此西風吹淚滿衣襟旅懷久客江城事事慳一尊聊爾破愁端吳雲無雁傳鄉信楚水有魚供旅飱燕子乍來風力軟桃花欲動雨聲乾今朝偶為尋芳出試著春衫尚覺寒乙酉二月十六日偕楊貫道謁張貞居外史留宿南山登善庵明旦以詩奉别澗阿不到一年餘此日重來訪隱居銀燭照花明渌酒石函封蘚貯丹書雨添瀑水春池滿雲起山忩曉室虛自愧匆匆回俗駕不堪松下别霞裾陪黃晋卿提舉楊震卿山長宴張貞居外史竹軒仙家風景少人知亭館春明宴客遲黃鼠登盤脂似蠟白魚落刃鱠如絲天香冉冉花雙品日色暉暉竹數枝始信蓬萊在塵世門前車馬自紛馳坐上有牡丹二朵故云送張仲舉應奉回京師宴韓提舉宅主人開酌宴華堂異果珍羞次第嘗燕客題詩鄉思逺吳姬勸酒曲聲長風吹楊栁依依緑雨過荼䕷細細香此㑹殷勤還繼燭莫教今夕斷離腸題陳思復喜白髮詩卷髙人大隱飬修齡喜見年來白髮生種種儘從頭上滿星星漸向鏡中眀不緣憂事添千丈只為看詩益幾莖一任鬙颯垂領居間幸免著塵纓次韻白蓮素質天然不假妝盈盈步入水雲鄉前身曽結逺公社古製猶存屈子裳月佩有聲沈水玉氷肌無汗愜龍堂夜深偏稱清間客來共西池一味凉次韻髙則誠參軍題少微山巨樟老氣長身倚斷崖蒼皮鐵甲漬深苔幾年造化栽培力他日明堂柱石材風挾雨聲龍起立月籠雲影鳯飛來長令煉藥山中侶想像鬱藍天上臺次韻題東岩石巖削作鐡城埤荒磴盤盤一線微萬古筆峰欹日轂半空劍石掛雲衣傍無扳木愁猿過下有摩巢老鶴飛此地從來天設險亂離民復得依歸次韻同周子符晚步溪上紫烟生逺林乘間偶出散冲襟青山如故詩人老紅葉無言秋意深萬里封侯非我願半生學稼識農心凉風滿路歸來晚且對黃花索酒斟次韻友人送别之淮東萬里關河落木秋又擕行李上扁舟元龍湖海增豪氣司馬山川愜壯逰帆影乍開風浩浩客程漸逺水悠悠應知别後相思處眀月天涯江上樓客忩晚望旅景蕭條霜氣催江楓樹樹錦成堆天髙雁影和雲落風急濤聲帶雨來未辦緑尊供客醉空憐黃菊向人開一時歸興難排遣邂逅成詩亦懶裁武林舊館寂寞江山舊帝州重來景物倍蕭颼客忩素月凉如水子夜清風淡欲秋聽竹亭空蒼石古種松地冷碧苔幽老懷正自難消遣嘹唳江邊過雁愁挽楊震卿山長芹宫半世守儒官冷况蕭然道自尊琴在舊堂湖月冷劍橫新塜嶺雲昏吳山猶認生前面楚水難招沒後魂雪滿西橋橋畔宅梅花心事與誰論客中思歸世道艱難轉覺危回頭五十五年非紅旗黃紙從無分白髮青山可息機二頃稻田環馬墅一區茅屋傍漁磯西風吹動家鄉念心與孤雲稍稍飛馬墅所居地名夏日周子符過訪用杜工部嚴公仲夏枉駕草堂詩韻二首溪流曲曲路盤盤逺辱髙人此駐鞍别久忽驚詩骨瘦飲多尚覺酒腸寬茅齊雨積晴猶潤竹徑雲深夏亦寒坐對棊枰遺世慮不妨相與盡清歡深谷幽居類隱盤喜無俗客枉金鞍門前修竹籠烟碧溪上間雲度水寬茶竈旋燒松葉濕硯池頻滴井華寒君來莫訝無供給野水添杯罄一歡賦林亭新霽二首瀟灑林亭近翠微雨餘斜日送清暉茶香細細蒼烟起樹影離離翠羽飛林下無人敲竹户水邊有客製荷衣偶來坐石乘凉久間看髙松野鶴歸恰匝松篁引樹凉玲瓏忩户納晴光曲簷乍挂游絲細斜隙初看野馬忙紫蘚緑苔行處滑碧苞丹實酒邊香留連自適清幽趣坐聽琴聲古意長挽周子符近陪談笑碧山堂一别俄驚半載强秋到聞公才卧病朝來走使忽傳亡香銷琴室松風冷燈滅書忩竹月凉惆悵老成零落盡望雲揮泪倍悲傷送王本立赴京師丈夫有志取侯封賸喜君家襲世功腰佩虎符頭已雪胸韜豹略氣如虹策書此日才名遂尊酒何時笑語同若㑹故人張應奉為言耕釣老山中次韻答道元上人久住靈泉學苦空青青瘦竹伴癯容朝飛錫杖無驚鶴夜誦經臺有聽龍說法精微多聚石洗腸清净更餐松歸來趺坐巖西屋白月如珠照筆峯次韻中秋登水光山色亭時王縣尹季山長同遊䇿䇿凉風拂帽輕緩扶藤杖出西城縣公小隊能同樂詩老髙懷覺倍清白石清溪寒潦縮丹崖紫谷夕陽明廣寒桂樹今何似贏得年年折又生癸巳立春夜夢得詩一聨樹當曉户生雲氣水入春池泛日光覺後足成篇山寇傳聞已破降一杯新酒浣愁腸樹當曉户生雲氣水入春池汛日光柏葉未欺華髮改梅花猶帶去年香家居無事心逾喜八十慈親夀且康雙溪道院贈葉逸民讀書精舍最相宜一炷清香晝掩扉虛白自生林下室軟紅獨上客中衣間階雨潤苔痕合小徑風清竹葉稀邂逅與君同此興求詩問法兩忘機再用韻二首蕭條孤館傍溪湄榆栁隂隂緑滿扉風挾水聲長到枕雨含林潤欲侵衣一春客路情懷惡千里家山音信稀爭似髙人樂幽隱不知人世有危機郭外人家近翠微雨餘嵐氣濕忩扉花畦軟土紅粘屐竹徑深苔緑染衣門巷日長人語寂樓臺春盡燕來稀靜觀萬物多消長造化無言默運機遣悶風塵澒洞幾時清軍旅經過阻客程江岸落帆春浪急野橋沽酒夕陽眀朝廷將相非無䇿田野耰鋤漫作兵回首東南天宇濶白雲飛處倍關情聞子規獨立溪頭聞子規寸心欲折鬢成絲東風巷陌花飛處細雨園林葉暗時顧我艱難頻作客經春愁悶强裁詩雲山入望鄉關逺徙倚長橋有所思錢唐亂後滿城瓦礫總成堆往事傳聞尚可哀士族盡從西渡去官軍却自北關來黃金宅第無完堵白骨沙場有濕苔惆悵錢唐舊時月夜深空照怒潮回次韻松學述懷腐儒粗糲愧無成偶向芹宮著薄名春晚石壇青杏合日長藝几素琴橫此身漸覺垂垂老世事堪憐滚滚生底用辛勤貪寸祿故山風月有餘清次韻雨中述懷湖水紆餘漲緑新門前杏子已生勻漫天風雨連三月過眼光隂又一春冷况自慚同鄭老間居爭得似安仁老來堪嘯微官縳懶性從來只任真午溪集卷六
