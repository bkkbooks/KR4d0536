body:
  text: 午溪集卷八元陳鎰撰七言律詩次韻山莊一徑縈紆繞澗邊東風吹雨漲山泉緑隂樹合編茅屋黄濁泥深種秫田池暖魚翻雲影動巖空鶴唳谷聲聨莊近赤巖何因無事能來此燒竹烹茶掃石眠次韻友人見寄我慚衰病似文園倦迹棲遲不出門世路風塵何日息江湖舊友㡬人存移家避難依山頂開逕通幽斷樹根待得衡茅新結就約君來此共汙尊庚子歲旦次韻山城兵火經過後舊業能留有㡬人萬事從來皆定數一杯且喜及新春謾憐児女稱吾夀深荷天公眷此身坐對青山無愧色紅塵幸不汚漁巾蓮城感事次韻一自兵戈破栝州豪華盡付水東流惟聞夜雨新城柝不見春風舊市樓負郭田荒青草合依山冡廢白楊愁烟塵滿眼何時静尚説江淮戰未休舟中次友人韻溪頭日出曉風生一片歸帆促早程極浦沙寒氷皓耀逺山雲盡雪峥嶸君如杜甫猶覉旅我似馮唐已老成回首荒城城下路青苔白骨易傷情次韻海棠海棠花下聴啼鶯無奈愁多積似城亂世每憐家累重休官僅得此身輕年來憂事添衰病老去看花減舊情便恐臙脂汚泥雪明朝風雨近清眀次韻留題此巖留此巖前瀑布懸雲開古洞見青天仙人丹化無來鶴舊傳丁仙煉丹於此釋子禪閑獨種蓮荒徑苔深初過雨空山花暗自流泉誰能結屋依林下夜聽松風枕月眠次韻友人雨後過緑猗亭山徑無人掃白雲苔㾗草色雨餘春欵門看竹客無事汲井烹茶主不貧亭外幽花閑自落林間啼鳥偶相親知君未擬歸城市曵杖時還訪野人次韻葉文範訓導見寄二首騷客攜書過逺林日長無事稱閑心路通巖寺僧供茗樹合山亝鶴聽琴兩處懐思憐近别一封書札寄新吟玉溪風月渾如舊應念青青竹數尋我懐食口衆如林遣悶聊攄玩物心容膝自安元亮宅賞音誰識伯牙琴溪頭蒼石看雲坐竹外幽軒聽雨吟多謝作詩相慰勞却慚衰髪老駸尋次韻道元上人逺回青青錫杖雪侵頭厯徧名山始倦游眀月歸來巖下寺清風唫倚峽西樓羡師得道如文暢老我棲身似許由試和詩篇扣禪意世間誰解悟浮休和周内翰題紫虚宮韻清溪紫谷繞琳宮縹緲樓臺在半空人世㡬囬經刼火此山終古有仙風斗壇露冷星華濕丹井泉甘海脉通試想蓬瀛無此處雲深島樹碧于葱次韻九日同友人小酌憂樂随時道未窮何須咄咄更書空艱難老我頭添白富貴從渠面發紅稍喜得閑詩有債却憐多病藥無功為君掃取溪軒净共對寒花酒一中次韻友人對月感懐有客臨溪玩月眀樓髙不用夜寒生二年此地因逃難孤影他鄉易感情露下長天含夕潤風來大野起秋聲想君未厭山中住且與漁樵混姓名次韻呉伯京學正清明拜墓清明拜掃陟山丘積草荒苔露未收林鳥紛紛争曉祭野花寂寂自春愁眼前児女能供奉身外功名豈用謀此日歸來天漸晚半㾗新月掛城樓次韻劉彦英教授春日同宴呉元正宅林下詩翁偶出來凭髙一望壯懐開山川如故人應老城郭都非鶴自囬逺樹拂雲眀似畫長溪過雨緑於醅喜逢佳友同春賞花底芳尊得欵陪閑居遣興抛却㣲官興浩然歸來茅屋已三年林間掃葉因風後溪上看花未雨前白板橋通沽酒店緑楊樹繫釣魚船此生已决投閑計自種村南百畆田再和韻清溪繞屋竹蕭然瀟灑蕉衣樂暮年數㸃歸鴉流水外一行飛鷺碧山前功名已似沈泥劍嵗月還同下瀨船試向小亭閑玩物滿池荷葉緑田田郡中㑹伯玉不見齊君二十年舊游何許一茫然因悲世事如雲變尚喜交情似漆堅廢市雨深蒼樹合嚴營風静彩旗懸眀朝又作溪頭别遥望岑峰月漸圓次韻九日招友人飲午溪樓亂罷君來居此地兩逢重九共持觴舟移野渡衝殘雨人倚曽樓醉夕陽頭髪又添今日白菊花只似舊年芳登臨無限傷時恨盡付東流溪水長次韻毛彦明訓導過訪山齋終日睡昏昏有客相過夜向分張燭共談三載别讀書謾守半生勤自憐冷味虀鹽淡不放氷腸麯蘖醺明日沙頭又分手小舟撑破一溪雲和葉子華見寄韻三年冷舍近蟾溪青杏婆娑桂樹低巖寺每尋僧說偈皋亭還與客分題别來歲月身逾老亂後山川塵尚迷想見東林如舊日好随松鶴共幽棲題秦少游别曇法師詩後昔聞淮海秦公子謫宦南來古栝城晝卧藤隂迷客夢春游沙外聽鶯聲三年監稅無他事一日逢僧話此生結社題詩遺跡在髙風還似晉淵明壬寅三月八日避亂西澗十八日復移石梁寨瀟瀟苦雨濕衣裘兩度移居尚未休巖樹層層雲霧暗野花片片石泉流怕遭兵火依髙寨愁對妻児憶舊丘恰似擕家江上住明朝風浪又移舟次韻西澗主人二首憂時心緒亂如絲世事安危局面棊倦驥長年悲逺道驚烏明月繞髙枝絶憐素髪垂垂老深念綈袍戀戀時春晚故園歸未得想添新筍滿階墀落花飛絮共游絲長日閑消别館棊隴麥雲深連宿穂井梧隂合長孫枝川原自覺同仙境人事猶如未亂時濁酒一尊聊自遣坐看新月上前墀次韻雜興二首世事無窮蟻磨還移家暫隠此山間耕桑自樂民風厚兵火無驚客意閑沙岸水明花的的石闌風暖鳥關關赤巖聞道猶竒絶約子何時共陟攀繞澗青青萬竹林一春為客此登臨傷懐事往聞猶怕遣興詩成懶再吟交友每多時俗態知君獨有歲寒心山忩岑寂松隂晚謾冩薰風絃上音輓孫伯融都事半生湖海不相逢亂罷蒼山始識公暫領一州兼節度更分數屯總元戎風流翰墨文多熖壘塊胸襟酒屢中偶堕奸謀身竟死千秋萬古恨無窮次韻友人游呉山别墅二首亭館髙明客喜臨門深無事寄豪吟日長幽鳥窺簾影風定閑雲堕砌隂香梟古屏書滿案苔封蒼石竹成林晚來更適無窮趣洗耳重聽月下琴主人開宴賞新晴濃緑隂隂如水清銀甕碧香浮臈味錦箋繡句冩春情倚闌看盡先尋譜掃石圍棋黙用兵欵客殷勤忘晝永夕陽猶隔小溪明和周山長别後見寄韻窮居彼此共棲遲薄宦無成與願違白髪五年愁避亂青燈一夕喜論詩雨凉吠蛤喧人耳風定流螢入客衣别後相思心獨苦猶懐把酒夜深時中秋對月次韻屢遭離亂奈愁何對月今宵感慨歌萬里烟塵連紫塞九天風露下銀河無人折桂當秋賞有女乘鸞或夜過歲歲青光只如舊却憐白髪滿頭多上總制胡公次陳伯亮韻安南上將喜來歸路入雙溪暑氣㣲憂國半生心獨苦籌邊三載盗應移暫分外省紆華選合向中朝侍衮衣一道奎光照蒼括深山窮谷被餘輝朱門畫㦸衛嚴居甌越民安絶吏漁身佩龍泉三尺劍家傳豹畧一編書且須部列平沙幕未許閑乗下澤車白髪小儒瞻望久自憐爾雅注虫魚挽李山甫教授避亂山中白髪垂近聞訪舊入城池蘆花月淡人無處桂子風凉鴈過時旅襯回程扶道左舉家迎哭向溪湄他鄉莫恨相知少自有門生奠酒巵和葉仲和文學見寄韻馬湖橋畔曽分手五見凉風換葛衫上國無媒干禄飬北山小隠免林慚石池乘月通泉水苔徑鋤雲種竹杉多謝相知為相問心閒日與野人談次韻友人生日栝山隠士喜年髙㸃㸃霜華入鬢毛雲屋天香生古桂霞杯春色映仙桃翻經釋子飛金䇿稱夀詞人集褐袍我亦知君眼如月夜忩不厭看書勞次韻友人游留此巖今春曽作此巖游花落山空水自流到院怯逢僧定後看雲始悟此生浮長松結子應千歲老鶴生孫知㡬秋尚憶箇中風景好何須海上覔蓬丘勝地何因得再游石闌干外看飛流青江樹老霜華冷金碧山空土氣浮清梵夜收僧歩月小亭晝坐客吟秋知君獨有林泉樂我亦相將卜隠丘次韻鄭訓導二首幽人曉踏渡頭沙逺趂閑雲訪我家投老山中聊煮石尋仙海上未乘槎尊傾緑酒酬彭澤盤飣黄柑擘永嘉日短天寒年已暮且看飛雪散瓊花一水囬環漾淺沙竹林深處老夫家山童招鶴穿樵徑溪鳥窺魚立釣槎人得居閑心獨静詩因吟苦句方嘉窮居漸覺囬春意簷外梅枝已着花次韻葉訓導元旦擕詩見訪苦吟詩客鬢蒼華又向東風試墨花栢葉謾供新歲酒竹門還訪故人家紛紛世事仍多患落落吾生未有涯溪上五年相伴住釣竿随分占鷗沙次韻葉文學立春日城廻過訪寒盡山城換厯頭雪消春水滿汀洲梅花村外逢朋舊竹葉尊前話客愁直把詩書為活計故應魚鳥識風流老來豪氣猶如昨共卧元龍百尺樓郡中元夕次韻逺水粼粼生淺洲溪風吹月上城頭軍中檛鼓春營宴馬上觀燈夜市遊誰向崑崙重斫寨獨懐鄉國謾登樓凋零人物都非舊頼有梅花慰客愁次韻友人郡中訪舊春日泊舟城外川故人相㑹問平安十年牢落謀家苦四海亂離行路難旅館青燈宵雨暗戰樓畫角晚風寒豪華往事誰能説莫向尊前起浩歎贈醫人馮英伯一别馮君今十載重來猶帶舊行囊空忩灸艾消沈疾新卷編蒲冩秘方閲世已經三折臂憂時還轉九囬膓飬生道要如相授分我刀圭換鬢霜次前韻答王子如秋日故人來野堂生涯彼此一書囊投閑已著歸田録飬老還求種樹方謾有篇詩酬逸興可無尊酒沃愁膓白頭亂後俱强健却似黄花獨耐霜次韻齊子和山長過訪竹外書齋午睡醒忽驚有客扣門聲十年離亂成分首一日相逢話别情歲晚吾仍憂病肺天寒君尚促行程明朝又向山城去滿路梅花入品評奉和王憲使賀總制胡公得平陽詩韻平陽一旦送降旗大將威名衆所知聚石江流分八陣通途海國絶他岐許君劍在蛟須斬韓子文成鱷定移盖世功勲垂不朽繡衣使者著聲詩山行至桐川㑹周山長遥望長松何處是深山猶認舊川原行程客厭闌干路此處路險多用石闌生事農忙碌碡村若箇峰邊雲出沒叢生樹外月黄昏武昌詩客欣相㑹夜向溪軒共一尊五月二十四日游平山菴客懐豁然用前韻呈周濟川葉誠中一菴瀟灑何年構半近青山半近原羣木叢中留古冡小軒明處見孤村竈燒落葉茶烟濕門掩蒼雲竹日昏羡爾主賓無箇事晚凉堂上注芳尊欲至松學連日阻雨再用韻奉簡諸友欲訪蟾峰雖咫尺瀟瀟風雨隔平原故人只在松邊館倦客空吟竹外村兩處離懐溪水濶一襟幽思嶺雲昏舊栽青杏今何似想見隂濃覆酒尊夀蔡伯玉隠居故人年長周花甲嘯詠溪山樂有餘世隠一區楊子宅家藏萬卷鄴侯書歌姬擁座飛瓊斚賀客盈門集翠裾最好聨魁堂下桂年年開占月明初八月三日伯玉留飲西澗别館二首前年避亂此山中今日還來訪隠翁山色入樓簾捲雨水聲落澗坐生風身安畎畝如龎老妓擁登臨擬謝公筵客殷勤到曛黒酒酣攜手石梁東憶昔遨遊湖海中只今華髪總成翁詩詞倣古多唐體人物居閑有晉風且把酒杯酬地主莫將世事問天公何當結屋來相傍坐聽松風澗水東同孫伯起遊留此巖再用前韻偶來聽瀑此巖中藜杕相随只兩翁凉氣着衣梧葉雨秋香薰路桂花風洞幽僧禮白毫相潭净魚游赤鯶公坐久石壇林影亂斜陽歸踏小橋東次韻周山長見寄久客松州生有涯松陽一名松州青山無價儘堪賒苦吟只為酬詩債薄俸多應付酒家十載風塵雙短屐半生江海一浮槎如今老去宜謀隠静閲丹書憶少霞題何子逺典史詩卷風塵十載共飄零湖海空留漫浪名君為奉親辭薄宦我因歸計識勤畊天機衮衮青春去世事紜紜白髪生好向溪頭理漁艇緑波烟雨結鷗盟次韻祝公亮經厯見寄辭官陶令歸來久我亦居山結草堂亂後病懐惟藥褁老來活計袛詩囊曽陪古寺看脩竹忽見春風綻野棠但願此身强健在歲寒松栢共蒼蒼次韻伯玉隠君大方上人過訪地僻深門傍竹開一溪流水碧於苔雲邊煮茗延僧坐石上留棊遲客來白社閑居宜老境青雲濶歩屬英才艱難世故猶如此且共筵前有限杯午溪集卷八
