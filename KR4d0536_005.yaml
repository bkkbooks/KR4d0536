body:
  text: 午溪集卷五元陳鎰撰七言古詩謝楊震卿山長惠李息齋枯木竹石圖我家栝蒼西山西重岡復嶺藏廽溪蔦蘿篁竹最深密半生此地成幽棲爾來汨汨隨寒暑走遍東吳與南楚長嫌客舍似雞栖夢寐山林有遺墅李侯標格清逼人胸中丘壑絶無塵戲將醉筆一揮灑怪石古木連蒼筠先生好事緹藏久不意今朝落吾手却如置我故山間謖謖清風起林藪客中愁絶夜不眠萬里秋思隨人先便須擕此歸挂草堂時時開酌賞以瑶華篇謁張伯雨外史先生昔住句曲山瓊樓絳闕相通寬飛幢遊戲九霄上下視赤日如跳丸却來平地尋舊隱摩挲古石看煙䀶孤雲蹤迹偶還往此身本在無還間天書雲篆真訣祕蒼精含景秋芒寒老我江湖倦遊客洗心只欲聽談玄蓬萊弱水如可到願借來鶴隨遊軿開元宫有來鶴亭煙䀶石次韻周子符中秋賞月去年為客錢唐館序屬中秋涼意滿杜門獨酌風雨來簷溜瀟瀟聲不斷今年歸上午溪樓長天月白還中秋洞簫吹徹夜寥閴玉盤正在闌干頭素光眩眩清無奈興豪欲踏鯨鰲背此生此景須盡歡放浪形骸天地外金尊瀲灔生酒波圑圑桂樹青婆娑人生四美不易具此酒不飲如公何贈寫竹齊伯玉少微躔下有佳客紫髯漆髮雙瞳碧前年騎鶴遊廣陵傲睨江濤弄明月雄才犖犖天馬駒清標炯炯氷玉壺滿襟英氣斂不住却與竹君傳畫圖酒酣肝膽露芒角雪壁淋漓翻墨汁興豪一掃數百竿立玉排空森列戟蒼煙漠漠橫髙秋虛堂晝靜聞蕭颼知君用心亦良苦落筆竗覷文洋州我漸飄泊大江北嵗晚交情冷如鐵欲留此畫共結三友盟只恐一夕通靈化梭壁次韻同徐子蒼賞海棠芳姿艷質天與妍玉環飛燕俱堪憐昭陽華清留不住化去却作花中仙當時扶醉春容醒富貴風流兩矜逞雕欄玉檻安在哉依舊東風好光景今人尚愛宫中妝一春對花醉百場踏歌槌鼓窮夜飲連天畫燭迷春芳老我偏慙腳無力十年奔走他鄉國花時偶喜得還家把酒看花空太息教兒莫放清樽空剪取步障圍春風人生得時且歡樂少年轉眼成衰翁次韻賦無言上人盆石海窟移來一拳石膚寸中藏勢千尺天然幻出補陀宫使我觀瞻晤空色瑞光隱隱生霧煙清氣霏霏充几席夜來對坐默無言水月清涼梔子碧次韻友人西湖訪梅經年旅食紅塵市壓座笙歌喧醉耳山林清夢竟荒迷眼底詩人能有幾朔風吹寒澄宿霧聞道西湖梅半吐共君漂泊在天涯却嘆流年暗中度疏花冷蕊回陽春清波淡月傳花神君命得句更竒絶對花如對氷玉人老我見梅心愈醒曽向湖邊弄香影不愁雪後白糢糊再約孤山訪和靖寄張外史鐡冠峩峩鶴氅裘沖襟炯炯氷壺秋進履曽下黃石拜辟榖獨從赤松遊官府真仙上界足富貴於我如雲浮乞取金丹換毛骨飛佩往謁崑崙丘次韻客中答友人我生牢落寡時偶半世江湖厭奔走霜風吹破黑貂裘畫虎不成羞類狗羡君意氣隘八區自説功名分中有往時曽學屠龍技向去當施縛麟手萍蓬偶爾屢相逢黃金醉輦如澠酒去年共訪西湖梅今年又賦平山桞侈然惠我雲錦章五采繽紛落晴牖自慚衰老百不如深荷交情日親厚難將魚目報夜光但惜黃鐘調瓦缶倚歌慷慨不自羇酒酣拔劍蛟龍吼次韻夏日野步繅絲人家雞午啼南牆雨過篁竹齊出門更喜新緑淨旋布石磯行過溪香醪滿榼供提擕垂楊樹外聽鳴鸝因嗟田父行水泥有餉不充葵與藜三月十三日同松陽諸友遊東臯過逍遙宫分韻得草字葛中野服偕詩老步出東臯散懷抱尋幽更到逍遙宫坐我澄軒淨如掃山寒石竇雲起遲地逈松林鶴歸早何時重約黃冠師直上靈巖拾瑶草中秋感懷呈松學諸友我昔扁舟泛淮水萬頃琉璃月光裏夜深復上城南樓笛聲未斷簫聲起燕姬二八比玉花纎纎瀲灔傾流霞筵前舞袖影凌亂青年意氣百倍加歸來嵗月如轉燭圓缺隂晴幾悲樂只今白首歎無成晚得一官飰不足江北江南多亂離吁嗟赤子無所依長松古邑亦遭毁空餘野草秋螢飛乾坤浩蕩父老盡逝水東流徒浼浼世間萬事何時終豈若龐公鹿門隱人生對酒當盡歡此宵此月能幾看杜陵詩老曽有語無使霜露沾衣寒次韻夀友人銀潢秋水洗丰骨談笑掀髯豪興發婆律旃檀香味浮琉璃琥珀酒光滑雖無紅袖共歡娛謾有清詩寫竒絶祝君之壽老益堅靜夜觀書眼如月秋日葉訓導招飲分韻得摘字主人登樓宴賔客笑語相歡盡今夕蟾溪清浸月光秋兔阜寒通雲氣白舉頭但覺銀漢低澆胸未怪金杯窄重陽更約醉西風牆根菊蕊應堪摘再分韻得百字南陽有客髯如戟更覺心腸堅鐡石擕來舊日書一囊分坐中齋燈半席制齡且學餐菊英辟世休言種桃核便當沽酒消窮愁袖中我有錢三百溪樓小宴分韻得頭字西風浩蕩吹衣裘天氣漸冷黃花秋山城酒熟方新篘雖非九日堪追遊今朝偶出招朋傳擕尊采菊登髙樓雕盤烏几羅珍羞一觴一詠相賡酬蟾光當忩青入眸珠簾倒挂珊瑚鈎曉霞絢彩晴未收白蘋掩映波光浮醉酣更覺忘百憂胸中世故散不留詩成復作商聲謳他人能有此樂不丈夫命達當封侯未達自分歸林丘我聞𢎞景不出休何須更畫金籠頭題院判石末公見惠趙仲穆雙馬圖使君惠我雙馬圖雄姿逸態世所無流傳韓幹舊墨迹湖州公子親臨摹湖州自是名家駒繪畫此馬與衆殊鬃鬛蕭蕭朔風起舉足萬里無長途彎弓馬上者誰子駝裘烏帽貂襜褕遊韁飛鞚栁隂外射殺黃熊及於莵只今世亂多戰伐駑駘龍種同馳驅邊城人馬半已死空令撫卷成嗟吁使君統領百萬夫要平南楚并東吳英雄事業佐玄德願起此馬如的盧次韻孫都事越中大雪歌庚子之歲云暮矣越中大雪若幽薊凍雲十日撥不開亂灑斜飛勢容裔山川髙下爛瓊瑶世界三千色無二倚壑髙松折巨枝入地遺蝗藏醜類乾坤已回北作南凝沍隂中有和氣白頭父老為咨嗟百年覩此真竒異仄聞城市三尺餘陋巷益深難擁篲漁翁披簔迷晚歸童子映書忘夜寐我雖寒苦興自豪一上層樓豁胸次豈無黨進酒淺斟不學袁安户深閉醉酣箕踞正長吟忽有詩從鳯池至左司先生文武兼統制吾邦居重位凛然清氣逼銀河散此六花飛大地兵塵沴戾盡洗空窮谷深山亦漸被因知天意兆禎祥明年大有公當記好溪堰為吳明府作縣公築堰東九里大堤橫截長溪水引流下注萬頃田禾稻翻風翠雲起去年陂堰未曽開况值亢旱天為災城中亂罷正蕭索兼無秋實人民哀今年爭看決渠雨龍骨長間挂梁梠老農仰卧歌南風但知歡樂無所苦君侯事業如白公流芳千載無終窮願公更展作霖手均此德澤四海同次韻葉中甫見寄葉公與我皆竒士骨相崚嶒氣雄偉當年湖海屢相逢酒酣擊劍秋風起結交落落青雲賔談笑相過無俗軌潛心不復事詩書要取功名侯萬里誰知白髮成兩翁此意蕭條今已矣忽然寄詩來問安厯説舊遊情愈美况遭世亂多變遷富貴榮華如覆水嗟余獨抱寒苦調只有豪吟差可擬結廬幸喜近清溪賸種桃花紅蕊蕊約君待向春水肥共駕扁舟釣魴鯉次韻孀婦嘆用杜工部詩韻城東孀婦髮未華半生苦樂隨夫家前年夫戍死鋒鏑姑老子幼長吁嗟擕持幼子獨存立倚簾羞見燕雙入辛勤紡績得來薪晨昏奉姑粗供給鄰家女子瑳素頭壓鬢金叉髻相並下階自折櫻桃花愛惜嬌容時照井誰知孀婦拭淚痕為夫築墳松樹根此身抱節誓不改甘守寂寞黃茅材次韻蔡伯玉見寄吾邦風俗頗淳古田里居民皆樂土天教我輩以筆耕播詠聲詩遍寰宇飬生不用服金丹充腸自有苜蓿盤四時佳景足延覽清溪浩蕩山髙寒我昔别君為冷掾五載區區食破硯相望南北如風枝却喜歸來復相見去年風塵暗不開招我西澗同銜杯巖頭啼鳥日催起看雲聽瀑心悠哉只今世事已如此碌碌微官如敝屣便從巢許隱終身掬取清流洗塵耳午溪集卷五
