body:
  text: 午溪集卷九元陳鎰撰七言絶句遊南明山次周子符韻蕭蕭落葉委空山幽磴添苔護石闌一自三平騎虎去至今龕洞白雲寒再次韻畣海翁上人為愛石梁擔負山照心亭上久憑闌松篁不動雲飛盡清磬一聲山月寒紅塵飛不到青山留得詩人倚石闌林鶴已歸僧未返半巖秋雨瀑花寒夜泊桐江柂牙伊軋濤驚枕船腹凄涼月射忩正是客愁無處著數聲寒鴈起滄江客枕滿城風露氣漫漫鐘鼓聲中漏欲乾夢覺忽驚身是客半簷殘月五更寒重遊南山二老亭回望前朝大臣故冡前朝文物已凋零感慨重登二老亭荒冡尚留翁仲守百年松柏自青青過溪居次韻玉溪溪上晚春餘涼樾蒼藤日影疏間傍竹門南畔過石闌隂處看倏魚客中見菊病骨驚寒欲授衣年來身世更支離菊花相見渾如舊何事詩人鬢易衰同友人遊龍臺山勝因寺三枝藜杖陟秋岡風露初交野菊香行到勝因鐘巳午坐延松影過回廊遊清福寺昨日勝因扶杖去今朝清福駕舟來老禪迎客長松下間對黃花掃碧苔獨坐一炷沈煙百慮清殊方十月早寒生蒲團竹几西忩坐間聽西風送雨聲古斷腸曲花落長門日易昏不因芳草為銷魂玉闌干外東風過吹落罘罳月一痕再遊南明寺和舊題韻十載無因到此山滿階苔色上層闌堂中禪老眉如雪獨與青松耐歲寒村景隂隂桑柘雨初晴一片平田白水生野老相逢無别事共過深巷聽鸝鶊屋後青山屋外溪穿芳度密有深蹊白雲不隔經行處容我時來寄杖藜得張修撰書一冬卧病才方愈清曉開門起看梅野服忽然逢驛使翰林修撰寄書來題松竹梅圖一樹梅花兩箇松數竿修竹共清風生來不作趍炎態歲晚相看氷雪中夜飲月波堂花影當簾春夜長主人迎客月波堂深情得似深杯量消盡銅匜一篆香次韻題江山小景二扇面漠漠風煙遡碧流荻花搖蕩一江秋漁舟遙繫人家外短笛數聲生晚愁江上數峰凝紫煙江頭一水碧於天月華明處秋空闊疑有緱山駕鶴仙題閻仲彬墨菊采采秋花不自持黃裳正色變緇衣江南江北風塵暗三徑凄迷何處歸題美人背面欠伸圖東風背立好腰肢脈脈含情睡起時若使畫工開正面羅虬應不詠紅兒客中雪夕凍雲黯淡連江樹東望家鄉眇何處偶沽斗酒聊為歡閉門風雪千山暮漁父短篷煙雨泊鷗沙賸有魚錢到酒家近日人間多賦斂爭如水國作生涯余患肺病徐子蒼寄詩問安次韻答之徑竹猗猗緑似雲滿階涼影石苔新故人逺寄相思句應念山中老病身深巷沈沈白晝間一區林屋自清寬業多尚覺身為患慮遣應無心可安次韻聽竹亭乘間來坐此君亭瀟灑惟便客子情門外黃塵深沒馬誰知此地自秋聲夜起縣齋靜夜秋風起落葉蕭蕭撲忩紙酒醒疑是山雨來月明滿地涼如水宿蟾峰湖上蟾峰鎮碧波萬家髙倚石嵳峩我來却值秋初霽快覩中天月色多遊南巖三首天池步上巖頭路百盤石梁霜葉滿闌干白牛卧處雲飛盡惟見天池一鏡寒抱膝亭白雲深處啓重扄一徑斜通抱膝亭北郭戰塵吹不到老僧猶指樹青青亭北見縣郭妙髙臺妙髙臺在諸天上如入如來不二門欲把一言參妙處是心默契己忘言三月十日遊南明照心亭和舊題詩韻曽題詩句在名山感慨重來倚石闌三十年餘僧自老空留池水照心寒奉和劉伯溫貟外漫興詩韻并自述一十五首蒼嶺愁雲樹壓低青田明月鶴髙棲也知天庇神仙境秋色依然滿好溪杜老從來隱草堂每憂時事九回腸如今穩駕扁舟去且玩西江夜月涼經年為客在王門慨古論今道自尊應念山中貧病叟獨尋黃獨斸雲根曽記開尊向夜分北山堂上共論文可憐一炬成焦土空有荒垣鎖暮雲鶴骨清癯稱葛衣翺翔湖海未言歸荷花開盡炎光老又見江頭木葉飛蒼茫天地一郵亭客裏相看眼孰青江北江南經亂後故交零落似晨星未許身間隱薜蘿府書辟起聽鳴珂知君久佩文章印問字應多載酒過處世無為富貴酣急流勇退是竒男悠然自在樊籠外間對江山雪滿簮我今老矣守林泉破屋蕭然一榻懸每向秋宵看月色懷人千里共嬋娟猗緑亭前竹滿林紛紛蒼雪落層隂開軒載誦清風句歲晚寧忘故舊心昔曽遊覽遍山川泛泛身如不繫船今日棲遲茅屋下却憐多病對雲眠門外清溪水氣寒喜無塵俗事相干重陽誰共尊中酒忍見黃花白露漙山深五月囀黃鸝秋到惟聞烏夜啼欲寄相思無便使空吟短句付詩奚貧病真同涸轍魚澆愁幸有酒堪沽秋來詩骨饒清健自喜登髙不用扶秋水溶溶緑一灣青山疊疊白雲間而今不作功名念容我逍遙山水間午溪集卷九
