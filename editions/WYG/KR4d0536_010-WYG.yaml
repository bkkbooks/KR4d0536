body:
  text: 午溪集卷十元陳鎰撰七言絶句借漫興一十五首碧樹參差竹屋低半生此地惬幽棲悠然不盡登臨興屋上青山屋下溪紅塵吹不到溪堂時掬清泠沃酒膓山外亂鴉飛過盡數聲漁笛晚風凉徑竹猗猗晝掩門日移清影過芳尊午香一炷閑無事坐看幽禽下樹根一笑歸來避世紛山靈不用勒移文白雲本自無心出我况如今懶似雲十載緇塵染客衣田園今喜賦來歸此身與物同閑適倦翮孤雲自在飛溪頭擬結野翁亭更種溪傍萬竹青白髪一尊聊自遣夜深時看老人星窮簷隂合翳松蘿迎送都無白玉珂從此只知田野事山人溪叟日相過淵明歸隠成疎懶謾自題詩責五男三徑盤桓有餘樂葛巾牢裹棄纓簮殘年飽飯獨怡然陋室從教似罄懸䞉喜繞階多竹色晚來新月闘嬋娟一區舊宅帶秋林占斷溪南十畝隂長日坐分鷗鷺席㗳然忘我亦忘心秋風吹緑漲晴川老去生涯一釣船人世烟塵猶眯目争如沙上共鷗眠矍哉陋兒笑儒寒㣲禄資身已懶干手種園中千樹橘黄金顆顆露漙漙百畝新承溪上堰年荒幸免為飢啼舉家從此無憂色却笑涪翁憫跛奚買得漁家一尺魚床頭酒熟不須沽三杯飲罷斜陽裏行看青山信杖扶溪上幽居無限好天分地位頗寛閑我生本是疎慵者只合漁樵老此間次韻呉學録春日山中雜興七首亂世艱難寄此身暮年食蓼有餘辛一春勝事成虚擲空憶蘭亭王右軍碧山深處息兵戈石竇甘泉冷齒牙絶似天臺舊風景何人能復飯胡麻林樹深深石徑斜野橋村塢兩三家蕭條門巷人行少惟見疎桐自落花功名老去念頭輕盡日看山眼倍明甚欲買田為隠計囊空未辦孔方兄睡起書齋日正中松花飄粉滿房櫳山童頗解詩翁意茶竈猶藏宿火紅一溪流水繞山隈岸草青青長舊荄鷗鳥不知人事異自随釣艇去還囬故老相逢竹外村能談舊史憶乾元大兒昨日從軍去惆悵無人給曉昏題湖山十景翠屏晚對為愛群山列翠屏竹門終日不曽扄溪風吹却白雲去添得他山一抹青緑野春畊雨足田疇春水生青陽浮處有農畊村南村北秧初緑布谷樹頭相對鳴月浦泛舟與客擕壺夜泛舟水光不動月光浮洞簫吹徹湖山静應似坡仙赤壁游雪溪垂釣水濶天寒雪正飛漁翁猶在水之湄慿誰畫出溪頭景簑笠孤舟獨釣時竹樓清眺竹外登樓興自豪紛紛蒼雪冷吟袍浮雲吹盡秋空濶獨鶴歸來山月髙松嶺早行松林曙色未全分半入青山半入雲落葉鐘聲何處寺行人疑在夢中聞古寺鐘聲隔溪古寺夕陽時風送鐘聲落翠㣲想見老僧歸院晚山童未掩白雲扉平川霽色𣺌𣺌平湖蕩日光漁烟起處隔滄浪登樓有客看秋霽楊栁風多滿袖凉西山牧笛西山山下草離離斷隴平坡雨過時牛背牧児歸路晚數聲短笛倚風吹東岸漁燈月黒樓前湖水明漁燈㸃㸃過沙汀蘆風忽起光還滅疑是寒宵夜燐青道徑東巖砦荒村寂寞兩三家故壘東邊石徑斜巖樹不知人死盡春來還發舊時花贈别周善長之金華風捲山雲雪乍晴又攜書卷促行程知君此去雙溪上一路梅花管送迎午溪集卷十
