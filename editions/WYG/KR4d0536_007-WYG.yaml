body:
  text: 午溪集卷七元陳鎰撰七言律詩遊逍遥觀欲至雲岩不果奉真門外逍遥觀銀闕瓊樓倚碧岑萬樹古松雲氣濕一溪春水雨㾗深山靈久䕶黄金鼎僊客閒調白玉琴欲訪雲岩天已夕杖藜他日約重尋次韻松學諸友見寄一昔與君分袂日特煩相送馬湖前老來易覺吟懐惡别後多慙俗事牽獨嶺松雲應滿塢東臯花雨想添泉還思重訪登臨地記得逍遥别有天九日偕計山長遊西巖寺次韻故人訪我當重九黄菊吹香滿一庭邂逅登髙同勝事留連到晚宿禪扄秋隂積潤雲生几山意催寒雨近屏坐對跏趺僧話久十年塵思豁然醒夜宿道元上人房再次前韻客至林房成一宿忽聞寒雨落空庭竹爐細火留餘煖松户深雲帶晚扄井水應潮生石穴洞霞成乳滴山屏只縁景勝吟難就坐對龕燈酒半醒次林彦文縣尹韻送劉伯温都事撫安青田三月江南草色新随車零雨浥輕塵繡衣奉命安民俗玉斧揚威出使臣𤣥鶴劃鳴雲洞曉青芝徧布石田春太平氣象今重見老我甘為擊壤人次林縣尹韻上元帥石末公落日長風動大旗寧令雲鳥識神竒世家共仰侯門㦸兵䇿誰參别墅棊烽火時時蒿目力指揮往往竭心思也知韓范兼文武還帶貂蟬侍玉墀松陽感事長松縣裏客重來舊上層樓安在哉天地無情經喪亂溪山有恨起塵埃故人半已歸黄壤遺業多憐長緑苔寂寞湖南烟色晚壊垣惟見枳花開次韻魏縣尹遊雲巖小蓬萊軒樹入仙巖一徑㣲公餘到此及春暉石缸香煖松花酒雲縷光寒槲葉衣未向神人求藥匕且從羽士問𤣥機山中異境難留客還向東臯歩月歸遊南巖寺蟾溪南畔小峩嵋幽磴盤盤上翠㣲路轉山亭休客駕林開雲屋挂僧衣天池水净涵秋月石筍峰髙障夕暉勝地從來隔烽火却憐人世刼灰飛南巖一名小峩嵋鐘梵無聲白晝遲沈沈古殿佛燈㣲石崖射日光摇几林壑藏風冷襲衣自昔乾坤鍾秀氣至今山水發清暉何時重到分禪榻坐看閒雲自在飛和賈縣尉秋日往山中詩韻二首野橋村路雨初晴滿袖凉風馬足輕松下㡬年淹宦况山中九日動詩情逢時又見黄花發感事俄驚白髪生且喜囊中無長物只留琴劍伴回程山色蒼茫翠欲流行經熟路憶曽遊西風鳥影寒塘晚細雨蟬聲碧樹秋過眼年光如急電傷懐世事等浮漚知君為國勤勞苦一寸丹心有百憂奉和元帥石末公元宵二首自嘆經年依半水那知今夕客嚴城中天月在無燈火午夜風來有柝聲濁酒不澆胸壘塊衰年猶覺句崢嶸昇平氣象何時見獨對梅花坐到明節序蕭條寧似舊夜寒燈火暗孤城星河淡淡流雲影鐘鼓遲遲咽漏聲撫事憂時心慨慷狂歌擊缶氣峥嶸崑崙關破當今夕遺史重看眼為明奉和元帥石末公春晴謾興詩韻使君惠澤似春陽田有來牟麥有桑日暖㦸門旗轉影風清玉帳劍生芒深山狐兎潛無跡曠野黔黎喜欲狂今日朝廷方倚重論功應不愧韓張暮春阻舟蘭江因病起登樓有作清明寒食客中過病起强登江上樓逺樹雲閒春漠漠落花風静思悠悠鄉書無雁頻勞夢波浪驚人久繫舟何處悲歌連野哭老懐寂寞不勝愁鳯凰山懐古舞鳯山形無古今百年王氣已銷沈荒凉禁苑經樵采寂寞歌臺貯梵音草暗碧橋分野色石寒白墖鎻雲隂傷懐往事空遺恨落日山前蟬亂吟題呉敬夫草亭亭在萬松嶺草亭幽絶在林端蒼霧丹霞遶石䦨松葉覆山禽自語苔痕匝地竹成竿繞花古井呼兒汲題畫新詩與客看羡爾風塵能吏隠聽猿時踏嶺雲寒友人移居再用前韻故人移住碧雲端取次尋遊興未䦨地隔城埤沉戍鼓山連湖水有漁竿石邊芝草和雲采忩外松枝帶雨看客至儘堪供茗飲古泓清浸玉泉寒秋日偶懐牢落天涯客倦游尚憐生計事悠悠二年道路誰青眼半紙功名人白頭落葉蛩聲吴月冷凉風雁影楚天秋傷懐處處猶征伐却憶滄浪舊釣舟秋日登呉山望城東戰壘愴然有懐亂後呉山依舊青登臨一望却傷情長河白骨沈寒水落日烏鴉噪古城湖上采蓮無畫舫關東種栁滿嚴營繁華從此成消歇潮到空江恨未平寄題陳此一鍊師夀巖詩卷聞説仙都陳道士靈書真篆得心傳藥爐火暖金丹熟夀穴雲深石髄堅鶴趂笙聲巖頂月龍囬劍影洞中天彭籛骨相應難老且住人間八百年次韻陳府掾宿治平寺棲雲軒詩客秋來欵竹扄清談時得共髙僧雲軒題畫朝揮筆石几看書夜對燈香篆繞盤烟細細粥魚敲木響登登寺樓髙處冝長望水滿蟾溪緑似䋲對菊有懐季山長薄宦經年未得歸西風黄菊已盈枝今朝把酒聊自適此地看花多所思世事不干迎客少舊交久别寄書遲莫言歲晚無廩粟山色水光堪樂飢再用韻答松陽諸友時自錢唐回故云青雲倦翮逺來歸尚愧棲遲寄一枝眷眷親朋嗟久别昏昏燈火話相思詩因感興吟來苦事不關心睡起遲天地無情吾輩老亂離誰為䘏寒飢二年孤館客忘歸身似飛烏繞樹枝世路風塵多喪亂故山松桂㡬懐思黄花紅葉秋將晚流水閒雲意自遲萬事無慿如夢飽區區誰解悟真飢感懐呈友人濩落才疎只自憐狂吟詩句漫成編三彭已伏庚申日六甲初周戊戌年心事無瑕如白璧此生守直類朱絃相逢且共尊中酒身外窮通縂付天次韻遊溪南野寺蕭然野寺惬清遊禪老詩人總素流迎客却從雲外入烹茶少為竹間留庭空古桂疎疎雨池净青蓮淡淡秋欲效淵眀同結社逺公還許再來否冬至日同友人尋梅翌日過溪南有作芒鞵藜杖踏山雲客裏尋梅詎厭頻行到溪南纔見樹看來枝北未多春水清沙白香㣲動雪虐霜欺色愈真喜得陽和消息早好分生意與詩人次韻答葉訓導長松廢邑兵戈後舊館秋深木葉零烟㓕市心雙井古雲飛溪上數峰青東臯訪鶴逍遥觀南麓尋僧抱膝亭多謝擕尊慰岑寂夜檐還共看文星次韻客懐二首孤館凄凉歸計遲世無鮑叔少相知天寒疲馬空喧櫪月冷棲鴻尚凍枝沽酒消愁忘爾汝題詩適興記吾誰西風昨夜吹庭樹叢桂山中入夢思三年客裏寄行藏摇落秋深感異鄉久敝黒貂驚歲月漸疎白髪老風霜乾坤納納胸襟濶山水迢迢道路長遥想故園清露曉滿林橘柚眩初陽丁酉秋浙省除青田主簿戊戌三月再調松陽感愧有作牢落乾坤一腐儒却憐半世事詩書廣文方入中朝選主簿重承外省除長擬報恩憂力薄更教佐邑愧才疎踵門有客來相賀旋買芳尊剪野蔬次韻感事獨立西風塵滿眼紛紛鷹隼少文鵷自憐人世逢多難誰叩天閽上萬言黄濁水深龍噴薄青㝠日逈雁聨軒客懐寥落秋將晚空對黄花憶故園再次韻懐歸褐衫偶着來從宦也躡通班綴鷺鵷報主慚無補衮手歸田只合共農言年來舊業書千卷老去閑心竹一軒有地寛閑午溪上木奴更種滿秋園次韻葉訓導雨中漫興避亂三年依郭外青蘿白屋鎻寒烟繞階山葉秋蟲響照榻書燈夜雨懸半紙功名猶未就數莖華髪已堪憐尋詩有客時相過竹下芳尊想未眠再次韻遣懐宇宙荒凉秋氣肅剛風未掃緑林烟人間烽火時時起天外妖星夜夜懸萬事多端何日静一官獨冷有誰憐故山風月應無恙歸到溪軒且晏眠中秋小酌分韻得長字故人中秋設佳宴垂簾下榻開中堂老桂清香沁露冷衆賔醉語含風凉上窯瓷噐飣肴饌長生木瓢行酒漿歡然飲罷雨忽作索紙題詩牽興長中秋風雨再用懸字韻長天雨暗中秋月兎影蟾光隔霧烟疲戍抱關雙泪冷小儒憂國寸心懸隂晴天意詎能測悲樂人生只自憐賴有桂花香醖藉挑燈孤坐不成眠次韻葉訓導移居曽向溪南隠一丘擕家今住市西樓水聲通沼凉生袂山色捲簾青入眸竹竈煮茶銷白晝石床壓酒醉清秋安居此外随吾分可效涪翁賦四休次韻夜坐聽雨寂寞山齋孤坐夜西風落葉雨瀟瀟水光入室凉偏潤地氣侵衣暑頓消静念人情狙賦芧更憐世事鹿藏蕉何時洗却儒酸態還共扶摇上九霄送元帥胡公往遂昌平㓂大將雄姿虎豹威濟時又起着戎衣牙旗有象分行伍鐡騎無聲聽指揮黄石一編參武畧孔明八陣合神機此行盡把妖氛掃笳鼓風清奏凱歸重陽後二日遣悶去年登髙蓮城北今年復在松山陽自嗟頭髪間白黒忍見菊蕋含青黄世亂甲兵戰未巳日報羽書馳更忙苦無尊酒慰寂寞東望家山愁思長次韻胡元帥題夘山邜峰髙聳碧孱顔見素真人此煉丹古井水寒通逺海紫壇雲暖擁羣山境超大地三千界天近層樓十二䦨遥想瓣香朝謁處青霞深護玉宸班遣懐二首平生賦性本疎頑拙宦雖縻心自閑黄菊尚留秋後徑白雲長在望中山瘦軀多病惟儲藥空屋無錢不用關松下兒童應笑我鬢毛只為作詩斑不出門庭腰脚頑幅巾短褐稱蕭閑墨濃硯石迷雊眼香暖爐烟起博山睡美黒甜便老懶飲酣白堕息機關今秋已負登髙興空想重巖細菊斑次韻劉宗保秋懐二首溪上青山抱郭囬濛濛烟雨暗樓臺平原日暮牛羊返逺路風髙鴻雁來斷續砧聲何處響凄凉菊蕋為誰開知君獨抱憂時苦我亦深同杜老衰擾擾風塵滿眼愁乍寒天氣怯深秋韲鹽况味聊堪守竹帛功名不用求今日聞雞無祖逖當年夢蝶有莊周自慚衰老將歸隠二頃還須為鶴謀次韻述懐時命多仇道未窮愁懐如酒味偏濃爭憐軒盖能乘鶴誰信泥沙解困龍黄葉一庭人迹少青燈孤館客情慵西風吹冷衣中線深念當時宻宻縫次韻答松學諸友二首門掩蒼苔人寂寂樹深幽鳥自鳴酬溪雲帶雨來池上林葉随風下屋頭萬卷有餘兒解讀一瓢自樂我何求山空歲晚梅将發寒夜茶爐肯共不不嫌官舍氊長冷酒熟詩温可獻酬䞉有禪談來白足更無俗事委蒼頭觀魚真樂惟心㑹識馬天機不色求我願買田為隠計未知造物肯從不訪梅溪上離離雪乍晴乘閑偶作訪梅行露寒徑怯青鞋濕風冷枝驚翠羽鳴孤艶向人春漸透暗香浮處水偏清留連為爾牽詩興不覺沙頭月又生雪後過溪南二首東風吹我過溪行沙路迢迢傍野平通堰水聲氷下響背城山色雪邊明大田春早農歸業故壘雲空戍解兵幽鳥亦知人意樂飛來枝上語新晴輕衫短褐稱閑行遥望長湖鏡面平草際雪消開凍色沙頭日出映波明喜聞盗賊為黎庶幸免耰鋤鑄甲兵今日追游差可樂謾將詩句賞春晴再次韻述懐二首萬事區區磨蟻行胸中壘塊未能平山深小縣春猶冷溪近層樓月易明多病未因詩作祟破愁謾以酒為兵倦抛書卷支頥坐閑看飛雲弄晚晴擊節狂歌酒屢行棲遲宦况負平生流年冉冉青春過衰鬢蕭蕭白髪明觸事每憐遭語穽忘機已覺息心兵飄然歸思如風桞萬縷千絲亂曉晴二月十日樞府辟往栝城再用韻别諸友驪駒歌罷尚遲行一棹長溪春浪平岸桞依依連野碧林花灼灼映空明苦吟每笑杜工部愛酒猶憐阮歩兵薄暮落帆松嶺外相望月淡雨初晴次韻友人過訪溪上東風吹㡌斜故人乗興到山家掃雲坐石因看竹拾葉分泉為煮茶十載功名如沐漆半生學業似炊沙只今擬作郊居賦無奈憂時鬂早華次韻餞别清尊終日共徘徊苦為吟詩擊鉢催脩竹滿庭蒼雪落好山當户晚青來斜陽林外人相别流水溪邊首屢回今夜相思知獨苦不禁寒月照忩梅病起有作披衣曉起坐中庭稍覺春深肺氣平游宦三年頭愈白居山數月夢還清階蘭楚楚新芽茁逕竹猗猗緑笋生幸喜晚年無别事有田二頃樂歸畊再用韻答友人日長迎客過門庭閑坐荒苔石磴平烟際桞條無賴碧雨餘湖水不勝清我無才力如韓子君有詩名似孟生亂世相逢宜共隠一犁慎勿廢勤畊次韻登玉溪山絶頂溪頭一片碧崔嵬我為尋幽亦上來山勢漸髙黄葉盡天光忽近白雲開因懐王子笙吹月更憶羊公石卧苔此處儘堪逃亂世漁郎相見莫相猜午溪集卷七
