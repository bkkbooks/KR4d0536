body:
  text: 午溪集卷四元陳鎰撰五言律詩冬夜書懷三載廣文館蕭然類野僧病懷猶索寞詩句自崚嶒樓逈初更鼓忩寒獨夜燈擁裘坐無寐漸見月華澄獨坐蟾峰常在眼獨坐更當軒衰晚名猶薄棲遲道自存瓦寒簷雀聚帙古壁魚繁嘆此風塵際幽懷孰與論挽葉學録故人不可見一夢遽登仙宅廢兵戈際池荒草樹邊諸生懷絳帳孤子守青氊寂寞蟾峰下傷情夜雨懸挽徐學賔相逢離亂後吾道竟悠哉愧乏陳蕃禮憐多徐孺才看山頻曳杖對月幾銜杯今日平舒路懷君倍覺哀過楊山長廢宅廢宅經離亂心傷往事非堂中人已去梁上燕空歸徑草煙䀶積門槐雨葉稀無言對斜日惆悵一沾衣遊白塔寺園山空秋日晚信步到名園古井通潮脈鄰牆過竹根雲移塔影動河隔市聲喧已覺催歸興投林鳥疾奔丁酉八月十二夜武陵對月是日省除青田主簿眀月相將滿照人歸興長清光疑不夜孤影在他鄉賸把芳醪酌從無錦瑟張桂花偏有意茲夕送天香次韻陳府掾山寺述懷久憩招提境秋風醉叵羅山空雲起石林冷葉辭柯世事塵機息詩懷野興多絶憐同作客牢落竟如何再次韻答周學録此地風塵息聊堪避網羅潛鱗依舊穴倦翮戀深柯遲暮相知少艱時感慨多酒醒過半夜奈此客愁何次韻蕭别駕秋懷四首并呈章參謀徑年縻薄宦秋晚興悠哉掃徑深門掩聨鑣上客來清談延晝永衰髮覺年催嘆惜遭離亂愁腸日九回空齋宿雨霽涼氣入衣裘簾捲青山曉池涵碧樹秋自經人世亂轉覺此身浮矯首乾坤闊傷懷王粲樓端居聊自適逺色望中眀載誦悲秋句難忘憂國情溪風薦微冷山月吐寒更兀坐渾無寐愁聞警柝鳴木葉蕭蕭下哀蛩石上鳴鬢毛衰易白胸次鬱難平聽雨添鄉思看雲識世情沉吟多感慨搔首立前榮再次韻未嫌官舍冷秋色頗佳哉有客論文坐無人載酒來疏隂涼葉隕急景候蟲催吟罷間延佇長廊日影回䔩䔩夕風起輕寒生薄裘數峰林外晚獨樹水邊秋世事萍無定此身雲共浮據林一長嘯還憶庾公樓晚景頗好道寸心孤月明山川遊宦况松菊故園情遼渺天難問艱危事屢更倚闌生逺思雲外暮鴻鳴涼氣漸凄肅吟風黃葉鳴間庭多雨積秋草與階平久為傷時亂都忘玩物情儒官粗堪守勇爵是浮榮三用韻答松學諸友此地三年客登臨亦快哉幸無官長罵喜有故人來把酒捲簾坐吟詩擊鉢催蟾峰青楚楚時見鶴飛回牢落風塵際天寒一弊裘看來官獨冷贏得鬢添秋樹潤煙光合池深水氣浮鄉心日夜切戍鼓起城樓水色循階碧山光入牖眀客稀無俗事地僻有幽情但得親朋厚何慚主僕更隨時聊自遣憂樂以詩鳴萬木漸搖落涼風策策鳴客愁驚老大世亂念升平雖忝官曹列難忘丘壑情故園頻入夢松菊想敷榮挽項學齋相聚今三載交情只似初艱難逢亂世辛苦卜幽居得米時沽酒分燈夜看書老成零落盡吾道復何如早過湖南湖月娟娟在衣寒怯早行水邊孤鶴起郊外亂雞鳴牢落身將老艱危世未平何當謝塵鞅歸傍白雲耕次韻簡周濟川山長二首故人辭薄宦去隱白雲鄉溪樹春天晚山泉夜月涼携家憐杜甫齊物憶蒙莊知爾身和世於今亦兩忘白首頻遭亂其如造物何縱鱗乘駭浪病鶴托修柯别友歲年久懷人夢寐多扁舟須過我沽酒聽漁歌寄友人憐君來此隱竟日掩岩扉山晚碧雲合溪深黃葉飛干戈雖暫息鄉國未能歸想見行吟處寒波淡落暉挽道元上人二首久玩林泉月今乘古峽風身遺萬劫永道悟一塵空寒竹留枯節幽花落舊藂惟餘行誦處山意逺無窮寺樓扁山意元公今殁去令我獨懷思經罷惟談道禪餘不廢詩雲巢孤鶴守石洞斷猿悲寂寞燒香室忩寒白月遲元公號雲巢和吳伯京學正立春見寄韻我已多衰病君今亦老成閉門驚臘盡把酒及春生但願兵戈息從無爵祿榮郡齋風月好吟咏足幽情拜故參政石末公祠堂一代名臣録公應作首推功勳家有集忠義主深知海右戍今已人間病不治瓣香千古意遺廟草離離奉題按察使詩卷使臣持玉節南國動春容古驛梨花白荒城栁葉濃居官無酷吏在野有耕農明日回􅔕馬蒼山雲萬重贈周山長并序濟川周君於余為斯文骨肉今冬乃子善長膺省召躬送其行過余言别謾成律詩一章以寫歲暮之懷并為善長贈行云歲暮猶行役風霜襲緼袍幸無嫌酒薄聊爾助詩豪世事皆前定人生謾自勞功名如可取端合付兒曹和吳學正見寄韻二首一從相别後寄迹各東西歲月身惟老風塵眼欲迷依山松徑窈臨水草堂低獨坐相思夜凄涼月滿溪不見故人久悠然多所思郡齋呼茗碗山館理桐絲望斷雲凝處吟殘葉落時風霜歲年晚還共竹猗猗五言絶句題買從道枯木石圖寂歷何年樹槎牙傍水村霜風吹葉盡秋色落雲根次韻老去頭添雪愁來眼著花清尊不成釂間坐到昏鴉懷張應奉故人千里外相見一何難幾度裁書尺秋雲鴈影寒野步隨意踏春沙緣塍度菜花偶逢溪叟語行到野人家次韻過湖南竹林一徑入深寂森然萬琅玕日暮雪欲落翠袖生薄寒題草堂晚景圖逺水涵碧波重山斂暝色琴客期未來草堂新月白題方泳道縣尹竹石圖瀟灑數尺篁孱顔一拳石開卷清風生凛然見寒碧客中九日客居鄰小市有酒有黃花莫訝無詩友故鄉天一涯今晨風落帽秋鬢覺蒼蒼小酌聊成醉都忘在異鄉偶題小亭環緑筠瀟灑宜宴坐是中賔主誰明月清風我晚興野興遂幽討獨行河水湄平原忽空曠蟬聲在髙枝渡江殘月曉猶在微茫水氣涼潮來風滿棹送客過錢塘病起夜坐二首獨坐寒忩夜深爐火欲灰無窮身外事都逐雨聲來自憐衰老貌燈影雪千莖藥餌扶吾病詩書寄此生明旦再用前韻杜門聊守拙利祿念俱灰舊雨曽來客如今雨不來古鼎燒香篆朝盤薦菜莖淡然間自適何用學吾生春日漫興二首人間境亦幽鳥鳴山更靜臨流玩落花清興與川永開園近屋頭日陟自成趣心懷千載期鋤雲種松樹午溪集卷四
