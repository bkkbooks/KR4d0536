body:
  text: 午溪集卷七元陳鎰撰七言律詩遊逍遙觀欲至雲岩不果奉真門外逍遙觀銀闕瓊樓倚碧岑萬樹古松雲氣濕一溪春水雨䀶深山靈久護黃金鼎仙客間調白玉琴欲訪雲岩天已夕杖藜他日約重尋次韻松學諸友見寄一昔與君分袂日特煩相送馬湖前老來易覺吟懷惡别後多慙俗事牽獨嶺松雲應滿塢東臯花雨想添泉還思重訪登臨地記得逍遙别有天九日偕計山長遊西巖寺次韻故人訪我當重九黃菊吹香滿一庭邂逅登髙同勝事留連到晚宿禪扄秋隂積潤雲生几山意催寒雨近屏坐對跏趺僧話久十年塵思豁然醒夜宿道元上人房再次前韻客至林房成一宿忽聞寒雨落空庭竹爐細火留餘暖松户深雲帶晚扄井水應潮生石穴洞霞成乳滴山屏只緣景勝吟難就坐對龕燈酒半醒次林彥文縣尹韻送劉伯溫都事撫安青田三月江南草色新隨車零雨浥輕塵繡衣奉命安民俗玉斧揚威出使臣玄鶴劃鳴雲洞曉青芝遍布石田春太平氣象今重見老我甘為擊壤人次林縣尹韻上元帥石末公落日長風動大旗寧令雲鳥識神竒世家共仰侯門戟兵䇿誰參别墅棊烽火時時蒿目力指揮往往竭心思也知韓范兼文武還帶貂蟬侍玉墀松陽感事長松縣裏客重來舊上層樓安在哉天地無情經喪亂溪山有恨起塵埃故人半已歸黃壤遺業多憐長緑苔寂寞湖南煙色晚壞垣惟見枳花開次韻魏縣尹遊雲巖小蓬萊軒樹入仙巖一徑微公餘到此及春暉石缸香暖松花酒雲縷光寒槲葉衣未向神人求藥匕且從羽士問玄機山中異境難留客還向東臯步月歸遊南巖寺蟾溪南畔小峩嵋幽磴盤盤上翠微路轉山亭休客駕林開雲屋挂僧衣天池水淨涵秋月石筍峰髙障夕暉勝地從來隔烽火却憐人世劫灰飛南巖一名小峩嵋鐘梵無聲白晝遲沈沈古殿佛燈微石崖射日光搖几林壑藏風冷襲衣自昔乾坤鍾秀氣至今山水發清暉何時重到分禪榻坐看間雲自在飛和賈縣尉秋日往山中詩韻二首野橋村路雨初晴滿袖涼風馬足輕松下幾年淹宦况山中九日動詩情逢時又見黃花發感事俄驚白髮生且喜囊中無長物只留琴劍伴回程山色蒼茫翠欲流行經熟路憶曽遊西風鳥影寒塘晚細雨蟬聲碧樹秋過眼年光如急電傷懷世事等浮漚知君為國勤勞苦一寸丹心有百憂奉和元帥石末公元宵二首自嘆經年依半水那知今夕客嚴城中天月在無燈火午夜風來有柝聲濁酒不澆胸壘塊衰年猶覺句崢嶸升平氣象何時見獨對梅花坐到明節序蕭條寧似舊夜寒燈火暗孤城星河淡淡流雲影鐘鼓遲遲咽漏聲撫事憂時心慨慷狂歌擊缶氣峥嶸崑崙關破當今夕遺史重看眼為明奉和元帥石末公春晴謾興詩韻使君惠澤似春陽田有來牟麥有桑日暖戟門旗轉影風清玉帳劍生芒深山狐兔潛無迹曠野黔黎喜欲狂今日朝廷方倚重論功應不愧韓張暮春阻舟蘭江因病起登樓有作清明寒食客中過病起強登江上樓逺樹雲間春漠漠落花風靜思悠悠鄉書無雁頻勞夢波浪驚人久繫舟何處悲歌連野哭老懷寂寞不勝愁鳯凰山懷古舞鳯山形無古今百年王氣已銷沈荒涼禁苑經樵采寂寞歌臺貯梵音草暗碧橋分野色石寒白塔鎖雲隂傷懷往事空遺恨落日山前蟬亂吟題吳敬夫草亭亭在萬松嶺草亭幽絶在林端蒼霧丹霞繞石闌松葉覆山禽自語苔痕匝地竹成竿繞花古井呼兒汲題畫新詩與客看羡爾風塵能吏隱聽猿時踏嶺雲寒友人移居再用前韻故人移住碧雲端取次尋遊興未闌地隔城埤沉戍鼓山連湖水有漁竿石邊芝草和雲采忩外松枝帶雨看客至儘堪供茗飲古泓清浸玉泉寒秋日偶懷牢落天涯客倦遊尚憐生計事悠悠二年道路誰青眼半紙功名人白頭落葉蛩聲吳月冷涼風雁影楚天秋傷懷處處猶征伐却憶滄浪舊釣舟秋日登吳山望城東戰壘愴然有懷亂後吳山依舊青登臨一望却傷情長河白骨沈寒水落日烏鴉噪古城湖上采蓮無畫舫關東種栁滿嚴營繁華從此成消歇潮到空江恨未平寄題陳此一鍊師夀巖詩卷聞説仙都陳道士靈書真篆得心傳藥爐火暖金丹熟夀穴雲深石髓堅鶴趂笙聲巖頂月龍回劍影洞中天彭籛骨相應難老且住人間八百年次韻陳府掾宿治平寺棲雲軒詩客秋來欵竹扄清談時得共髙僧雲軒題畫朝揮筆石几看書夜對燈香篆繞盤煙細細粥魚敲木響登登寺樓髙處冝長望水滿蟾溪緑似繩對菊有懷季山長薄宦經年未得歸西風黃菊已盈枝今朝把酒聊自適此地看花多所思世事不干迎客少舊交久别寄書遲莫言歲晚無廩粟山色水光堪樂飢再用韻答松陽諸友時自錢唐回故云青雲倦翮逺來歸尚愧棲遲寄一枝眷眷親朋嗟久别昏昏燈火話相思詩因感興吟來苦事不關心睡起遲天地無情吾輩老亂離誰為恤寒飢二年孤館客忘歸身似飛烏繞樹枝世路風塵多喪亂故山松桂幾懷思黃花紅葉秋將晚流水間雲意自遲萬事無慿如夢飽區區誰解悟真飢感懷呈友人濩落才疏只自憐狂吟詩句漫成編三彭已伏庚申日六甲初周戊戌年心事無瑕如白璧此生守直類朱絃相逢且共尊中酒身外窮通總付天次韻遊溪南野寺蕭然野寺愜清遊禪老詩人總素流迎客却從雲外入烹茶少為竹間留庭空古桂疏疏雨池淨青蓮淡淡秋欲效淵眀同結社逺公還許再來否冬至日同友人尋梅翌日過溪南有作芒鞋藜杖踏山雲客裏尋梅詎厭頻行到溪南才見樹看來枝北未多春水清沙白香微動雪虐霜欺色愈真喜得陽和消息早好分生意與詩人次韻答葉訓導長松廢邑兵戈後舊館秋深木葉零煙滅市心雙井古雲飛溪上數峰青東臯訪鶴逍遙觀南麓尋僧抱膝亭多謝擕尊慰岑寂夜簷還共看文星次韻客懷二首孤館凄涼歸計遲世無鮑叔少相知天寒疲馬空喧櫪月冷棲鴻尚凍枝沽酒消愁忘爾汝題詩適興記吾誰西風昨夜吹庭樹叢桂山中入夢思三年客裏寄行藏搖落秋深感異鄉久敝黑貂驚歲月漸疏白髮老風霜乾坤納納胸襟濶山水迢迢道路長遙想故園清露曉滿林橘柚眩初陽丁酉秋浙省除青田主簿戊戌三月再調松陽感愧有作牢落乾坤一腐儒却憐半世事詩書廣文方入中朝選主簿重承外省除長擬報恩憂力薄更教佐邑愧才疏踵門有客來相賀旋買芳尊剪野蔬次韻感事獨立西風塵滿眼紛紛鷹隼少文鵷自憐人世逢多難誰叩天閽上萬言黃濁水深龍噴薄青冥日逈雁聨軒客懷寥落秋將晚空對黃花憶故園再次韻懷歸褐衫偶著來從宦也躡通班綴鷺鵷報主慚無補衮手歸田只合共農言年來舊業書千卷老去間心竹一軒有地寬間午溪上木奴更種滿秋園次韻葉訓導雨中漫興避亂三年依郭外青蘿白屋鎖寒煙繞階山葉秋蟲響照榻書燈夜雨懸半紙功名猶未就數莖華髮已堪憐尋詩有客時相過竹下芳尊想未眠再次韻遣懷宇宙荒涼秋氣肅剛風未掃緑林煙人間烽火時時起天外妖星夜夜懸萬事多端何日靜一官獨冷有誰憐故山風月應無恙歸到溪軒且晏眠中秋小酌分韻得長字故人中秋設佳宴垂簾下榻開中堂老桂清香沁露冷衆賔醉語含風涼上窯瓷器飣肴饌長生木瓢行酒漿歡然飲罷雨忽作索紙題詩牽興長中秋風雨再用懸字韻長天雨暗中秋月兔影蟾光隔霧煙疲戍抱關雙泪冷小儒憂國寸心懸隂晴天意詎能測悲樂人生只自憐賴有桂花香醖藉挑燈孤坐不成眠次韻葉訓導移居曽向溪南隱一丘擕家今住市西樓水聲通沼涼生袂山色捲簾青入眸竹竈煮茶銷白晝石床壓酒醉清秋安居此外隨吾分可效涪翁賦四休次韻夜坐聽雨寂寞山齋孤坐夜西風落葉雨瀟瀟水光入室涼偏潤地氣侵衣暑頓消靜念人情狙賦芧更憐世事鹿藏蕉何時洗却儒酸態還共扶搖上九霄送元帥胡公往遂昌平寇大將雄姿虎豹威濟時又起著戎衣牙旗有象分行伍鐡騎無聲聽指揮黃石一編參武略孔明八陳合神機此行盡把妖氛掃笳鼓風清奏凱歸重陽後二日遣悶去年登髙蓮城北今年復在松山陽自嗟頭髮間白黑忍見菊蕊含青黃世亂甲兵戰未巳日報羽書馳更忙苦無尊酒慰寂寞東望家山愁思長次韻胡元帥題卯山邜峰髙聳碧孱顔見素真人此煉丹古井水寒通逺海紫壇雲暖擁羣山境超大地三千界天近層樓十二闌遙想瓣香朝謁處青霞深護玉宸班遣懷二首平生賦性本疏頑拙宦雖縻心自間黃菊尚留秋後徑白雲長在望中山瘦軀多病惟儲藥空屋無錢不用關松下兒童應笑我鬢毛只為作詩斑不出門庭腰腳頑幅巾短褐稱蕭間墨濃硯石迷雊眼香暖爐煙起博山睡美黑甜便老懶飲酣白墮息機關今秋已負登髙興空想重巖細菊斑次韻劉宗保秋懷二首溪上青山抱郭回濛濛煙雨暗樓臺平原日暮牛羊返逺路風髙鴻雁來斷續砧聲何處響凄涼菊蕊為誰開知君獨抱憂時苦我亦深同杜老衰擾擾風塵滿眼愁乍寒天氣怯深秋韲鹽况味聊堪守竹帛功名不用求今日聞雞無祖逖當年夢蝶有莊周自慚衰老將歸隱二頃還須為鶴謀次韻述懷時命多仇道未窮愁懷如酒味偏濃爭憐軒蓋能乘鶴誰信泥沙解困龍黃葉一庭人迹少青燈孤館客情慵西風吹冷衣中線深念當時密密縫次韻答松學諸友二首門掩蒼苔人寂寂樹深幽鳥自鳴酬溪雲帶雨來池上林葉隨風下屋頭萬卷有餘兒解讀一瓢自樂我何求山空歲晚梅將發寒夜茶爐肯共不不嫌官舍氊長冷酒熟詩溫可獻酬賸有禪談來白足更無俗事委蒼頭觀魚真樂惟心會識馬天機不色求我願買田為隱計未知造物肯從不訪梅溪上離離雪乍晴乘間偶作訪梅行露寒徑怯青鞋濕風冷枝驚翠羽鳴孤艷向人春漸透暗香浮處水偏清留連為爾牽詩興不覺沙頭月又生雪後過溪南二首東風吹我過溪行沙路迢迢傍野平通堰水聲氷下響背城山色雪邊明大田春早農歸業故壘雲空戍解兵幽鳥亦知人意樂飛來枝上語新晴輕衫短褐稱間行遙望長湖鏡面平草際雪消開凍色沙頭日出映波明喜聞盜賊為黎庶幸免耰鋤鑄甲兵今日追遊差可樂謾將詩句賞春晴再次韻述懷二首萬事區區磨蟻行胸中壘塊未能平山深小縣春猶冷溪近層樓月易明多病未因詩作祟破愁謾以酒為兵倦拋書卷支頥坐間看飛雲弄晚晴擊節狂歌酒屢行棲遲宦况負平生流年冉冉青春過衰鬢蕭蕭白髮明觸事每憐遭語穽忘機已覺息心兵飄然歸思如風桞萬縷千絲亂曉晴二月十日樞府辟往栝城再用韻别諸友驪駒歌罷尚遲行一棹長溪春浪平岸桞依依連野碧林花灼灼映空明苦吟每笑杜工部愛酒猶憐阮步兵薄暮落帆松嶺外相望月淡雨初晴次韻友人過訪溪上東風吹帽斜故人乘興到山家掃雲坐石因看竹拾葉分泉為煮茶十載功名如沐漆半生學業似炊沙只今擬作郊居賦無奈憂時鬢早華次韻餞别清尊終日共徘徊苦為吟詩擊鉢催修竹滿庭蒼雪落好山當户晚青來斜陽林外人相别流水溪邊首屢回今夜相思知獨苦不禁寒月照忩梅病起有作披衣曉起坐中庭稍覺春深肺氣平遊宦三年頭愈白居山數月夢還清階蘭楚楚新芽茁徑竹猗猗緑笋生幸喜晚年無别事有田二頃樂歸耕再用韻答友人日長迎客過門庭間坐荒苔石磴平煙際桞條無賴碧雨餘湖水不勝清我無才力如韓子君有詩名似孟生亂世相逢宜共隱一犁慎勿廢勤耕次韻登玉溪山絶頂溪頭一片碧崔嵬我為尋幽亦上來山勢漸髙黃葉盡天光忽近白雲開因懷王子笙吹月更憶羊公石卧苔此處儘堪逃亂世漁郎相見莫相猜午溪集卷七
