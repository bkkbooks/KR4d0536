body:
  text: 午溪集目録别集類四元卷一五言古詩卷二五言古詩卷三五言律詩卷四五言律詩五言絶句卷五七言古詩卷六七言律詩卷七七言律詩卷八七言律詩卷九七言絶句卷十七言絶句臣等謹按午溪集十卷元陳鎰撰鎰字伯銖麗水人嘗官松陽教授後築室午溪上榜曰菉猗遂以午溪名其集卷首題前進士曲阜孔暘編選前進士青田劉基校正前有黃溍張翥孫炎及暘基二人序翥序稱其學於外舅周衡炎序又稱其學於翥故其詩雖才地稍弱而吐言清脫不失風調蓋淵源有所自來前又載基暘手柬各一通基柬稱其體製皆佳而近日應酬之作去其一二則純美暘柬則稱其篇篇合律而中呂字字鏗金而鏘玉今觀其集誠不無稍傷冗蔓尚少簡汰則基言為能中其病且基序稱午溪集一卷炎序稱二卷暘序則稱四百餘篇今此本十卷與暘所稱頗相合是基所欲去者暘仍為存之宜持擇之未能悉歸精粹也乾隆四十一年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀午溪集原序午溪集者栝蒼陳君伯銖之詩也伯銖生逢盛時而不苟於祿仕徜徉里閈時出游江湖間平生所學兼著於詩裒其所得凡若干篇俾豫序卷首豫聞為詩者必發乎情人同此心心同此理則其情亦無以大相逺言詩而本於人情故聞之者莫不有所契焉至於格力之髙下語意之工拙特以其受材之不齊非可强而致也後世乃以詩為顓門之學慕雅淡則宗韋栁矜富麗則法溫李掇拾摹擬以求其形似不為不近而去人情已逺矣伯銖之詩一出於自然未嘗以凌髙厲空驚世駭俗為務指事托物而意趣深逺固能使人覽之而不厭者由其發乎情而不架虛强作也古詩之發乎情者是為變風若衛之淇奧是已昔者子貢舉是詩切磋琢磨之語而夫子許其可與言詩伯銖亦取是詩首句扁其所居堂曰緑猗殆有子貢氏之學乎其志未易量也姑以今之所見者序之如此云至正二年春二月庚申翰林直學士中順大夫知制誥同修國史兼經筵官黃溍序詩三百篇外漢魏六朝唐宋諸作毋慮千餘家殆不可一一論五七言古今律樂府歌行意雖人殊而各有至處非用心精詣未知其所得也余蚤嵗學詩悉取古今人觀之若有脫然於中者由是知性情之天聲音之天發乎文字間有不容率易模寫然亦師承作者以博乎見聞游厯四方以熟乎世故必使事物情景融液混圓乃為窺詩家室堂蓋有變若極而無窮神若離而相貫意到語盡而有遺音則夫抑揚起伏緩急濃淡力於刻畫㸃綴而一種風度自然雖使古人復生亦止乎是而已矣麗水陳伯銖父受學外舅此山周君衡有午溪集一編余嘗讀此山詩喜其深逺簡徑有詩家髙處既又讀午溪詩大篇短章何其聲之似君衡也伯銖年正强才正裕苟不絶於吟而㑹通所作焉古不難到也伯銖余交厚故論及此且書於午溪集後庶乎覽者謂所言何如也至正三年季春上除日應奉翰林文字登仕郎同知制誥兼國史院編修官張翥書元統癸酉秋監察御史辟河東張仲舉為金陵郡博士教弟子時永嘉李孝光天台丁仲容僧笑隱咸在炎以弟子員得從之游登石頭城坐翠微亭故趾大江西來如白虹繞城下淮南諸山盡在几席是日諸先生效韓孟聫句仲容耆飲口訥訥不能語孝光􅐖漆黑仲舉長面而鶴身善談謔酒酣日已沒宿龍翔方丈仲容困酒先引去笑隱出燭中坐孝光在左仲舉在右昆侖奴作遞書郵仲舉首倡曰先皇昔潜邸梵宫冠東南遺弓泣父老次授笑隱云云比曉仲舉奪筆走數韻成章余嘗論仲容詩若大宛天馬舉足萬里有蓋世之氣仲舉如鳴球琴瑟合軒轅氏律呂孝光若禹九鼎神姧物怪愴人心魄笑隱如棠溪之金隨手鑄器不離模笵而神采焰焰可畏嗟夫俯仰之間忽焉隔世獨仲舉先生尚存在燕二十餘年乃今得見伯銖於栝伯銖與余實同出張先生之門未相識也及相識而白髮種種亦如諸先生游石頭城時惜余幼不力學長無所樹立而空老矣猶幸及見伯銖伯銖有午溪集二卷詩多類張先生云伯銖姓陳氏麗水人退菴孫炎序古今詩人莫盛於唐唐之詩莫加於杜少陵自少陵而後學詩者未有不以少陵為師然能造其藩籬者蓋鮮况升堂入室乎蓋少陵號集大成不惟其古律詩皆備而體製雄渾窮妙極𤣥實兼前人之所長故其語有竒偉壯麗者有沖淡蕭散者有髙古者有飄逸者至論其入神處則皆在於沈著痛快焉學之者不辨其體製而混然一槩師之譬之欲涉江河罔知津渡之攸在雖㳂江河而步倣徨竟日終不得而濟矣夫伯夷栁下惠未得與吾夫子並而得與吾夫子俱以聖稱者以其一偏之行亦至乎極故也學詩者苟得少陵之一體而精焉則可以言小成矣栝蒼陳君伯銖好學善為文尤刻意於詩翺翔湖海與名公勝士游聞見益廣賦詠亦工有午溪集四百餘篇故黃文獻公與今仲舉張公伯溫劉公皆為之序將鋟梓以傳聞余至栝復馳書以集示余俾為之遴選且評其當否余黃公之門生嘗謁張公於燕謁劉公於杭三君子之議論固所敬聽而誠服者夫既皆贊君之詩矣余復何敢言雖然伯銖有命不容自己乃取其集端誦之者纍日但見夫良金美玉無可揀擇而興趣之髙詞意之雅則皆悠然有一唱三歎之音余始愛其五言以為古詩學陶彭澤律詩學孟襄陽七言則因是而擴之爾及吟諷之久然後知其一出於杜少陵蓋非泛學杜集而專師其一體所謂沖淡蕭散者是已若其寫懷序事往往慷慨可念又非得杜公沈著痛快之㫖者乎學詩如是可以自成一家矣大凡詩之本在乎達性情善作者不以雕琢為巧脂粉為華也往時聞劉須溪先生之語曰詩無論拙惡忌矜持又曰晉人語言使一用為詩皆當掩出今古無他真故也今伯銖所賦無矜持之態又皆一出於真此誠真知詩道者故能髣佛古人自成一家則可以傳世矣夫豈一朝一夕之力所至哉余非諛伯銖也知詩者虛心以諷之則有以得之矣伯銖所居在午溪上故因以名其集云前進士溫州路同知平陽州事曲阜孔暘序世之為詩者將以為名與詩三百篇作者之名間見一二其餘莫得而知也自漢以來文章始著名氏而行行重行行飲馬長城窟等篇猶不知其作者古之人情有所感則發為言將以明道非為身私是以切於事而造於理人得而傳誦之如食膾炙知其味之美而不必問其所從來也故所作不多而自傳非作者之期於傳也魏晉以降實始夸多而競靡然數百年間其大顯者不過數人其次所作雖多而其可傳者有限或八九篇或二三篇或存其名而所作無傳焉不切於事不造於理無所感於情而强為言故言雖多而不中譬如蜩蝒之鳴雖不入耳而不可謂之不能鳴者若是雖名傳於人亡益也麗水陳君伯銖有午溪集一卷觀其所著詩三百有餘篇則皆典雅有思致發乎情而不愆乎義可傳於世而不必其多者也余故喜而為之序焉至正丙申十有二月望日從仕郎前江浙等處儒學提舉劉基序
