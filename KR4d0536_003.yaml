  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0536_WYG_003-1a, image: WYG1215/WYG1215-0372a.png}
body:
  text: 午溪集卷三元陳鎰撰五言律詩溪上晚步散步斜陽外獨行無與期魚梁秋水落沙樹夕雲欹人事有間日溪流無盡時悠然心景㑹盤礴得歸遲送孔魯茂録事解官歸永嘉到老心常赤先憂髮易蒼紀綱吾道重風節古人方山驛黃花雨江村烏桕霜孤帆又東去離恨滿滄浪送西岩僧道元住靈泉寺細字看三藏眀心閲大千受衣岩下寺卓錫澗南泉一峽清風逺雙峯白月圓燈燈傳祖印自有雪堂禪登善庵訪張貞居外史不遇窈窕湖山外延緣土徑斜青林多佛屋白壁半人家鶴出雲無侶梅寒雪未華令人惜清興回首望烟霞次韻周子符過訪二首十里山川隔相過豈偶然浮雲懷往事逝水嘆流年徑窈存松菊池平散芡蓮開軒風日靜共詠白雲篇地僻景幽甚居安道自然飲泉甘勝乳種樹老忘年生意自家草清香君子蓮一尊延素月不愧北山篇宜晚樓樓小偏宜晚凉飈在曲櫺月生沙觜白烟著樹頭青一壑藏靈籟羣山入畫屏憑髙無盡興醉目豁然醒早程野日荒荒上岩花的的明水渾羣鹿過林靜獨禽鳴夜雨催農事春風厚客情肩輿堪坐憑詩興等間生訪隱者偶然來訪隱山崦有幽居日下看蒸藥風前伴閲書竹光青滿塢水色緑循除應笑塵中客終年幾覆車江村景物佳如此游觀意自如白雲生島嶼紅日下村墟水闊漁歌逺天長鴈影疏偶同江叟語端欲此移居晚泊日落江村靜風恬潮水平羇懷苦寥落嵗事况崢嶸崕臘梅花白沙寒雪片眀一杯篷下酒不放客愁縈錢唐送友人之維揚瀟灑一尊酒江樓得共傾相逢俱是客離别易傷情樹色迷春緑雲光拂曉晴還思拄帆處淮海正潮生次韻晚步閉門春欲盡偶出愜幽尋桑葉人家晚桃花澗底深看雲間倚石聽瀑懶擕琴蕭瑟青林下嵐霏滿一襟客舊館曽作蕪城客重來又五秋魚鹽河上市簫鼓竹西樓地暖梅花發天寒江水流依然風月好且復寄優游次韻訪靈泉上人二首携詩訪禪老地僻景途幽紅葉千林晚黃花一徑秋崕雲低屋角澗水落磯頭漸掃江湖迹相從話舊游山徑來雲氣烟林變晚容偶然成獨出且喜得相逢此興知誰㑹常時悔自慵長吟破寥閴凉月上髙松次韻村居寂寞三家市龍鍾七十翁相逢說生理自詫得農功雉雊來牟熟蠶登桑柘空時平人意樂邀我一尊同再游西峯寺西峯清淨地塔下有僧居曽見寶花座多留貝葉書禪師能伏虎長者解觀魚來此求無相塵心頓豁如客至客至衡茅下晴暾破曉新徑花紅半墮門栁緑初勻市逺盤無饌村深釀頗醇呼兒具𬞞筍聊爾見情真林亭小酌林亭多晚趣尊酒寫清歡山近雲侵座溪虛月滿䦨張琴深竹潤拂石古苔寒自足成吾隱逍遙寄鶡冠次韻游城東屠蘇尋僧朝偶出還似厭塵勞氷澗泉聲細霜林樹影髙倦行聊解屨小坐暫旋袍且喜逢支遁酬詩染兔毫旅懷風雪歲將晚客行猶未休山前沽濁酒江上發孤舟杳杳飛雲逺棲棲去雁愁歸歟是何日生理在林丘次韻月明德經歷游茅山冷泉澗犖確山中徑徐行暫卸鞍蘚青粘屐冷松翠滴衣單石竇留雲濕岩泉瀉月寒語來天已夕歸步向盤跚次韻道元上人歲晚二首山蹤迷落葉天氣正深冬崖雨添寒瀑溪雲向晚舂客憑臨水閣僧叩隔林鐘倚杖無餘事招猿下碧松地偏人跡罕境寂自無譁雲濕松忩硯風清竹屋茶石梁融雪液山沼落泉花臘近寒梅發相看鬢易華病起述懷二首居間無世慮塊獨守吾廬病起方除藥行來暫閲書秋花慰岑寂老髮任蕭疏何事馳驅者無心賦遂初溪邊成小隱竹裏結茅廬養鶴憂無料盟鷗喜有書山深寒到早門靜客來疏風俗饒淳朴游心太古初次韻答楊文學江湖成久客歸思忽然生富貴非吾願交游亦世情頭顱今已老生計尚無營一舸滄洲外梅花興自清武陵送友人之維揚西浙同為客維揚子獨游持杯酌别酒挂席促行舟夜月千燈市春風十里樓瓊花正堪賞到日却遲留丙戌元旦客中開門春滿室旅况尚凄凉椒柏迎新歲萍蓬在異鄉厯頭忘檢閲賀客少迎將獨有髙堂念今晨阻奉觴重游南眀山佛日寺重到南山寺清凉一壑風慧光明佛日梵語隱天宮岩洞留雲在池泉與海通三平人去後石虎勢穹窿次韻葉子西萬山秋欲盡邂逅古城中霜徑寒花晚風林落葉空笑談情自厚酬和句難工明日還分手看君馬首東次韻春夕旅懷此身同倦翮暫托一枝安山近春常雨溪深夜更寒燈花頻剪落香篆暗燒殘明日尋歸路松隂滿石䦨次韻郊居細水黃泥路空山白板門一身安畎畝萬事信乾坤架上舊書滿甕頭新酒渾小兒能采藥粗可給晨昏餞别楊貫道山長歸錢唐楊生别我去故國在天涯野店投鞭早江􅊑繫纜遲行裝無長物吟卷有新詩留取懷中橘還家慰母思己丑九月抵金華旅館和舊題詩韻冉冉嵗華換悠悠道路長老來兼病肺秋末尚殊方池水荷衣盡林霜橘子黃故園何日返已負菊花觴旅愁莽莽深春雨江花落漸多客舟偏阻滯兵甲屢經過深逝魚驚槮髙飛鳥避羅傷懷逢世亂吾道竟如何次韻同友人宿山家偶然逢故友擕手玉山西澗水穿林響崕雲壓樹低東風楝花老落日子規啼共宿松忩夜篝燈和舊題贈常恱道老年豪氣在衰髮已盈簮時掃先親墓難忘孝子心奚囊兼貯易行李只擕琴莫問窮通事相逢酒滿斟親墓在吾里題悅道預挽詩卷達人窮至理視死即如歸且願此身在何憂生事微卜塋垂後計學道覺前非羡爾超然者令人早息機松陽學舍讀張修撰詩因用韻述懷二首冷官無一事詩思日來添幽鳥閒窺沼游絲靜挂簷煮茶然小鼎看竹捲疏簾無怪居連市盤餐味可兼門深無俗軌春晚緑隂添竹色侵衣袂松花拂帽簷清風自開户明月忽當簾况有佳山水真成吏隱兼次韻友人移居二首知爾因離亂移家住白雲已逃狼虎患且友鹿麋羣消日惟憑酒傷時懶著文從今成小隱榮辱兩無聞強飲心先醉狂歌興易䦨登樓憶王粲閉户學袁安柏葉歲新改梅花春尚寒何時定相訪剪燭話艱難午溪集卷三
