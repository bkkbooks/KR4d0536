body:
  text: 午溪集卷一元陳鎰撰五言古詩古詩二首深谷有幽蘭獨抱林下姿濯濯見貞性不受蒿艾欺凄凉風露晨花葉兩葳㽔孤㓗羞自獻深晦乃若遺豈無采芳者悠然寄所思嶧陽有孤桐豈願材中琴嵗月倐以邁坐閲霜雪深一朝偶製用中存太古音臨風試新奏妙協鸞鳳吟但為以心聽何事鑄黄金呈黄晋卿學士二首龍媒出渥洼萬里捲沙礫未習和鸞鳴早困鹽車厄槽櫪少芻豆奴𨽻競鞭䇿偶然逢一顧驪牝有髙識鯤魚在北溟蝦蛭混其側一朝化為鵬獨去六月息鷦鷯與斥鷃小知非所測於焉得培風垂天起雲翼題徐氏貧樂亭人人慕富貴富貴多危機不如貧樂者自得道所資卓哉南州士澹然岩壑姿潔身事髙蹈心與千載期蟾峰飛白雲蟾溪涣清漪世慮日以淡道味日以滋壺觴自酬獻文字相娯嬉放懐山水間此樂知者誰題湯景山畊樂亭我耨日以畢我苗日以稠顧望浮雲隂巾車且經丘青山在原野白水滿甌窶浮生已粗足外物吾何求更欣桑麻成嵗晚完衣裘作勞聊自慰山中酒新篘次韻題周可翁清脩亭達人屏外慕處静得自安築亭蒼翠林心境清且寛凉風四面起戞戞鳴琅玕此時坐其下快瀹雙月團我亦愛竹者寄興同蕭閑素交日已非托爾盟歲寒過子陵灘潮来沙浦深潦積流波悍舟行釣䑓下老石在天半江山領呉越樹木記炎漢當時羅英雄髙見獨殊散所幸無緇磷千載同一旦區區往来者㡬閲洪濤亂清風不可攀搔首復三嘆武陵餞别劉元朗府推河水日下流客子倦行役東西南北間飄蕩無終極君候我邦来萬里問鄉國放舟桐江瀬繫馬虎林驛詎意天一陬邂逅得良覿江山几席間把酒連日夕春光倐云晚梨花已飄白况此覉旅中别離轉悽惻窮通雖異途出處宜努力相思有好音願寄南飛翼呈張仲舉博士二首長松生澗壑千丈高崔巍蒼然歲寒姿不受霜雪催深根踞厚地直榦排風雷眀庭要結搆大用須宏才願言庇震凌下慰寒士懐良馬出宛城羸垂在平陸踠跡鴑駘群彌年困覊束圉養無深知蒭粟不滿腹逸志忘騰驤櫪下成久伏一經伯樂顧終然致天育次韻題冷泉亭我游靈隠山木落素秋景廓然得遐觀萬象分馳逞古石嚙水痕寒山盪雲影投果拈白猿捫蘿陟蒼嶺回憇泉上亭載瀹山中茗濁根已疏雪至味方雋永不知塵世中有此清凉境緬懐白使君千載名不冷摩挲石上詩歲月發深省次韻季山父山長月夜見懐二首衡門臨清漪盥沐便畸人况無勢利牽得與漁樵鄰脩竹閟户牖幽苔謝車輪故人不我過忽復徂冬春風塵未寧肅世徳潜鳳麟所憂吾道衰益見白髪新升堂俱拜母夀酒得相因菽水可以養且用奉晨昏浮雲翳涼月大風哆南箕人生良鮮歡汲汲亦何為緬懐金石友素志當自持邈然阻良晤罹此世故危移家寄雲壑采蕨以充飢辟地誠未深可復畏奔馳艱難庶相顧念子如連枝何由對牀夜盡和山中詩次韻題荘雲卿竹崕詩卷種竹已成林森森列蒼玉扶疎古崖隂清風滿山谷若人心境空藉此伴幽獨老氣不可干廪廪生意足載歌淇奥詩逺勝十年讀何時造其所相傍秋雲宿餞别李仲正府推二首栝山峻而髙栝水清且漪睠此山水郡民俗易保釐府君来司刑眀清如伯尼坐使獄訟空青草滿圜扉棠隂亦蔽芾載歌南國詩泥泥白露凉叢叢青桂發時物一以變况復懐逺别鴻翼起髙逝萬里霄漢闊鷽鳩在榆枋鎩羽何由刷悠悠碧雲思佇立溪上月次韻程渠南過訪長松有髙人曠視天壤隘讀書闤闠中一室樂清快軒軒野鶴姿逈出雲霄外孤妍出衆醜大雅息羣籟偶来午溪濵一笑展良㑹終宵坐談文往往發竒怪芳畦蔬可擷清池魚可鱛相看任真率白酒傾沆瀣結交幸忘年俛首東野拜何時尋舊盟風雨連牀話次韻道元上人晚歩上人悟覺空久已遺世慮清吟唘𤣥機妙語發新晤孤鴻忘逺翔疲馬懐蹇歩偶濯澗底泉暫憇雲邊樹山空錫長随溪逺杯可渡曠懐諒自如撫景樂真趣矯望東西岩白雲自来去春日偕楊震卿山長城東散歩今晨薄霧散逺嶠晴光開駕言城東㳺杖屨相追陪花事在桃李日氣浮蒿萊適與景物㑹熈熈在春臺大哉天地徳萬彚出雕裁𤣥功不自有妙化付一杯而我與數子雅好無相猜及時此行樂且復寄尊罍次韻程渠南嵗晚見寄栝蒼有佳士磊落去崖岸髙唫如涌泉滌盡綺語硯讀書北山下矻矻窮嵗晏平生無媚容豈復事膏面散策松逕風欹枕竹忩霰慚我江湖間避迹同燕雁居然成落拓渉世寄憂患何當共尊酒晤語一蕭散贈楊貫道文學昔爾先君子卓犖有清識芳懐薄蘭茝髙誼重金石賦命何蹇屯乃為屢空廹一官在庠序老大亦無益今春我西来相見叙疇昔共游西湖濵竟日随杖䇿曉雲楚山青夜月呉水白重来今始秋乃有死生隔子幸繼髙風深慰我凄惻云胡談論間亦復嘆窮塞懐哉騏驥姿萬里汗方赤終當踏康衢未必困衘勒願子加自脩文業嗣前徳寄松雪上人憶昔游招提適喜塵事屏髙堂坐清晝日映松雪炯上人一單外淵黙守諸静了然塵幻空獨以詩自警童子為燒香汲泉煮春茗留客聴疎鐘聲聞發深省歸来忽三年寤寐鵲山境何時復相從踏月度修嶺題劉平妻殺虎圖役車在中野月落沙河濆此行亦良苦四望天無隣荒林風惨慽猛虎出咬人倉忙不相保殺氣横妖氛偉哉結髪婦為義亡其身提刀直刺虎虎死不敢嗔有此孱弱軀一勇冠三軍精誠照白日英風振蒼旻緬懐古馮媛當熊義則均永激壮士膽殆非兒女聞夏日幽居効建除體呈友人建溪粒粟芽中山千日醇除憂與破睡二物可䇿勲滿堂風月佳足慰閑散人平湖深且緑况乃清無塵定盟得髙友共守寂寞濵執禮雖雅道拘拘誠苦辛破帽與短衣且用完吾身危機陷富貴不如安賤貧成虧亦何有抱朴皆天真收歛貴深宻用舍随詘伸開簾對青山朝夕烟光新閉息觀其生堦篁緑初匀題松陽項氏瑞芝詩卷和氣致祥瑞在草惟靈芝造化之所鍾人力詎可為松陽有隠者結廬馬湖湄徳潤日已廣枯朽生神竒三秀同英華五色耀陸離睠茲生意深見者但嗟咨惟昔商顔翁采之以療飢冝爾孫與子食徳無休期松山翠綿邈松水清逶迤流芳暨千載永言著聲詩自題緑猗亭森森蒼玉林寒光眩晴色蕭然塵表姿雅有君子徳虚隂閟夏凉一枕寄閒寂睡覺聞秋聲清風度忩碧世間児女花紅紫衒顔色我獨愛此君種之如種徳築亭蒼翠中嘯歌慰幽寂豈待摇落餘始識千雲碧謖謖含風清娟娟净秋色懐哉七賢趣遺此千載徳忩虗月未来林静夜還寂危梢拂溪雲倒影澄波碧清風動竹聲眀月映竹色風月本無心於竹乃同徳外直凛貞勁中洞含虚寂作詩為寫神濃墨洒寒碧次韻程渠南歲月已云暮霜降林壑清吟軒忽我過樂此讙讌并舂容接晤語豁達傾真情汲泉煮山茗凍綆引孤缾次韻卲本初題東岩茲岩何穹窿屹立亘終古崖厂削劍痕石髄滴山雨天開一罅峡風響答人語行登最髙處逸興眇天柱出端居久無聊出郭頓清目烟光動墟里日影散林陸活水明淺沙疎花傍脩竹地勝如桃源何必隠山谷南泉嶺朝登南泉嶺午過南泉坂始辭山木隂已覺川原晚籃輿頗輕安風袂自蕭散行道雖逶遲遇物足延翫脩篁净娟娟寒水清練練因之懐故園秋花露初泫病起今日天無風肺氣稍平和起行庭户外好鳥鳴脩柯園花忽爛漫林笋出已多物情各向榮余亦散沈疴雖當兵戈際幸此居山阿有子識生理解種桑與禾但知田園樂禄仕夫如何乙未秋九月十五偕季山長登東岩分韻得妙字盤盤上青空落落展遐眺秋髙羣木變丹碧眩晴照東西兩岩起雲谷通􅌄窱天風忽来喁可以發余嘯人生塵世中千憂逢一笑寧将勝士槩下混俗子調夜投元公房菊泉試茶銚相從扣圎覺庶以達微妙客中移居為客棲未安地卑苦炎溽移此江上居山光醒心目囬環青竹林涼飈動相續寓情一尊酒放歌慰幽獨秋夜感懐夜凉疎雨過草木含幽滋素魄晦未眀隂蟲韻何悲獨驚莭序改遽覺鬢髮衰離愁滿中抱念此當自知過洪崕峡山長足力蹇計行無常程礨礨石齒亂十歩九折縈崖泉變為雨白日成晦㝠孤猿嘯雲裂幽鳥呼風生出峡漸夷曠清溪忽然横雅山分韻得開字雅山昔已到暇日還重来從㳺總閒逸杖䇿聊徘徊擕尊翫松竹褰衣坐莓苔心舒野夷曠目縱山崔巍適此象外趣滌我區中埃晤言若有得冲襟豁然開午溪集卷一
